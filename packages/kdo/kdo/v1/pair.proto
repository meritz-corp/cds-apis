// ============================================================================
// Pair Execution Log (사이클별 기록)
// ============================================================================

// 페어 실행 로그 레코드
message PairExecutionLog {
  // Pair ID
  int32 pair_id = 1;

  // 시그널 시나리오 (예: "BASE_HIGH", "COUNTER_HIGH")
  string scenario = 2;

  // 실행 결과
  PairExecutionOutcome outcome = 3;

  // Base 측 주문 ID (발주 성공 시)
  optional uint64 base_order_id = 4;

  // Counter 측 주문 ID (발주 성공 시)
  optional uint64 counter_order_id = 5;

  // Base 참조 가격 (원, raw int64)
  int64 base_price = 6;

  // Counter 참조 가격 (원, raw int64)
  int64 counter_price = 7;

  // 스프레드 (base - counter, 원, raw int64)
  int64 spread = 8;

  // 발주 시각
  google.protobuf.Timestamp dispatched_at = 9;

  // 상세 내용 (오류 메시지 등, optional)
  optional string detail = 10;

  // Base 슬롯 최종 체결 수량
  int64 base_qty = 11;

  // Counter 슬롯 최종 체결 수량
  int64 counter_qty = 12;

  // Base 슬롯 실제 평균 체결가 (원, raw int64; 미체결이면 0)
  int64 base_fill_price = 13;

  // Counter 슬롯 실제 평균 체결가 (원, raw int64; 미체결이면 0)
  int64 counter_fill_price = 14;

  // IOC 모드에서 트리거 마켓데이터 수신 시점부터 base 최초 주문 제출 직후까지의 경과 (us)
  // 비IOC 모드 또는 미적용 시 0
  int64 trigger_to_base_submit_us = 15;

  // IOC 모드에서 트리거 마켓데이터 수신 시점부터 counter 최초 주문 제출 직후까지의 경과 (us)
  // 비IOC 모드 또는 미적용 시 0
  int64 trigger_to_counter_submit_us = 16;

  // round-trip exit 슬롯 체결 수량 (CounterIocTpSl 전용; base+counter 실행은 미설정)
  optional int64 exit_qty = 17;

  // exit 슬롯 실제 평균 체결가 (원, raw int64; CounterIocTpSl 전용)
  optional int64 exit_fill_price = 18;

  // exit 슬롯 주문 ID — 정정 추적 시 lineage 최종 ID (CounterIocTpSl 전용)
  optional uint64 exit_order_id = 19;
}

// 페어 실행 결과
enum PairExecutionOutcome {
  PAIR_EXECUTION_OUTCOME_UNSPECIFIED = 0;
  // 발주 성공
  PAIR_EXECUTION_OUTCOME_SUBMITTED = 1;
  // 사전 검증 실패로 스킵
  PAIR_EXECUTION_OUTCOME_SKIPPED_PRE_VALIDATION = 2;
  // 쿨다운 중 스킵
  PAIR_EXECUTION_OUTCOME_SKIPPED_COOLDOWN = 3;
  // 사전 계산 없음으로 스킵
  PAIR_EXECUTION_OUTCOME_SKIPPED_NO_PRECOMPUTED = 4;
  // 한쪽만 발주 성공 (부분 실패)
  PAIR_EXECUTION_OUTCOME_PARTIAL_FAILURE = 5;
  // 전체 실패
  PAIR_EXECUTION_OUTCOME_FAILED = 6;
  // 체결 수량 없음으로 스킵 (filled qty = 0)
  PAIR_EXECUTION_OUTCOME_SKIPPED_NO_FILLED = 7;
}

message ListPairExecutionLogsRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];

  // 페이지 크기 (기본: 50, 최대: 200)
  optional int32 page_size = 2;

  // 페이지 토큰 (다음 페이지 조회용)
  optional string page_token = 3;

  // 정렬 기준 (기본: dispatched_at DESC)
  string order_by = 4 [
    (google.api.field_behavior) = OPTIONAL
  ];

  // outcome 필터 (UNSPECIFIED = 전체, 그 외 값이면 해당 outcome만 반환)
  PairExecutionOutcome outcome = 5;

  // 날짜 필터 (YYYY-MM-DD, KST 기준 해당 일자만 조회. 빈 문자열이면 전체)
  string date = 6;
}

message ListPairExecutionLogsResponse {
  // 실행 로그 목록
  repeated PairExecutionLog execution_logs = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;

  // 전체 건수
  int32 total_count = 3;
}

// ============================================================================
// Real-time Status Streaming
// ============================================================================

// StreamPairStatus 요청
message StreamPairStatusRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];
}

// 페어 단일 슬롯 실시간 상태 스냅샷
// (태그 번호는 클라이언트 UI 계약으로 보존됨)
message FillStatus {
  // 미체결 수량 (submitted - filled)
  int64 unfilled_quantity = 1;
  // 누적 체결 수량 (현재 세션 메모리 카운터, 재시작 시 0)
  int64 filled_quantity = 2;
  // 체결 VWAP (milli-won 단위)
  int64 avg_fill_price = 3;
  // 누적 발주 수량 (현재 세션 메모리 카운터)
  int64 submitted_quantity = 4;
}

// StreamPairStatus 스트리밍 응답 — 페어 상태 스냅샷
message PairStatusUpdate {
  // 리소스 이름 (pairs/{id})
  string pair = 1;
  // Base 슬롯 상태
  FillStatus base = 2;
  // Counter 슬롯 상태
  FillStatus counter = 3;
  // 스냅샷 시각
  google.protobuf.Timestamp updated_at = 4;
  // exit(청산) 슬롯 상태 — CounterIocTpSl round-trip 전용.
  // base+counter 실행(DualSubmit/BaseMakeCounterIoc 등)은 0으로 채워짐.
  FillStatus exit = 5;
}

// ============================================================================
// Pair Statistics
// ============================================================================

// GetPairStatistics 요청
message GetPairStatisticsRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];
}

// 페어 누적 통계 스냅샷 (인메모리 카운터 기반)
message PairStatistics {
  // 리소스 이름 (pairs/{id})
  string pair = 1;
  // base + counter 누적 발주 수량
  int64 total_submitted = 2;
  // base + counter 누적 체결 수량
  int64 total_filled = 3;
  // 발주 성공 횟수
  int64 execution_count = 4;
  // 실현 손익 (milli-won). 현재 메모리 카운터 기반.
  int64 realized_pnl = 5;
}

syntax = "proto3";

package kdo.v1.pair;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/resource.proto";
import "google/api/client.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// PairService - 두 심볼의 가격 조건에 따른 동시 주문 전략 관리 서비스
service PairService {
  // 단일 Pair 조회
  rpc GetPair(GetPairRequest) returns (Pair) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 목록 조회 (페이징 + 필터)
  rpc ListPairs(ListPairsRequest) returns (ListPairsResponse) {
    option (google.api.http) = {
      get: "/v1/pairs"
    };
    option (google.api.method_signature) = "";
  }

  // Pair 생성
  rpc CreatePair(CreatePairRequest) returns (Pair) {
    option (google.api.http) = {
      post: "/v1/pairs"
      body: "pair"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 수정
  rpc UpdatePair(UpdatePairRequest) returns (Pair) {
    option (google.api.http) = {
      patch: "/v1/{pair.name=pairs/*}"
      body: "pair"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 삭제
  rpc DeletePair(DeletePairRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{pair=pairs/*}"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 활성화 (status → ACTIVE, hot loop 시작)
  rpc ActivatePair(ActivatePairRequest) returns (Pair) {
    option (google.api.http) = {
      post: "/v1/{pair=pairs/*}:activate"
      body: "*"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 일시 중지 (hot loop 중지, status → PAUSED)
  rpc PausePair(PausePairRequest) returns (Pair) {
    option (google.api.http) = {
      post: "/v1/{pair=pairs/*}:pause"
      body: "*"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 실행 로그 목록 조회 (SimultaneousCompare 모드 사이클별 기록, 페이징)
  rpc ListPairExecutionLogs(ListPairExecutionLogsRequest) returns (ListPairExecutionLogsResponse) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}/executionLogs"
    };
    option (google.api.method_signature) = "pair";
  }

  // Maker-Taker 이벤트 로그 목록 조회 (PricingMakerTaker 모드 전용, 페이징)
  rpc ListMakerTakerEvents(ListMakerTakerEventsRequest) returns (ListMakerTakerEventsResponse) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}/makerTakerEvents"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 실시간 leg 상태 스트리밍 (카운터 변경 시마다 emit)
  rpc StreamPairStatus(StreamPairStatusRequest) returns (stream PairStatusUpdate) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}:streamStatus"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 누적 통계 스냅샷 조회 (인메모리 카운터 기반)
  rpc GetPairStatistics(GetPairStatisticsRequest) returns (PairStatistics) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}/statistics"
    };
    option (google.api.method_signature) = "pair";
  }
}

// ============================================================================
// Pair Entity
// ============================================================================

// Pair 전략 — 두 심볼의 가격 조건에 따른 동시 주문 설정
message Pair {
  option (google.api.resource) = {
    type: "kdo.cdsapis.xyz/Pair"
    pattern: "pairs/{pair}"
  };

  // 리소스 이름 (pairs/{id})
  string name = 1;

  // Pair ID
  int32 id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 전략 이름 (고유)
  string display_name = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Portfolio ID
  int32 portfolio_id = 4 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Base 엔트리
  PairEntry base = 5 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Counter 엔트리
  PairEntry counter = 6 [
    (google.api.field_behavior) = REQUIRED
  ];

  reserved 7;
  reserved "condition";

  reserved 8;
  reserved "exec_config";

  // 상태
  PairStatus status = 9 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 실행 모드 (oneof)
  PairMode mode = 10;

  // 생성 시간
  google.protobuf.Timestamp create_time = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 수정 시간
  google.protobuf.Timestamp update_time = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// ============================================================================
// Pair Entry
// ============================================================================

// 페어의 한쪽 엔트리 (단일 심볼 주문 스펙)
//
// 모드별 필드 사용:
// - SimultaneousCompare: side/quantity/price_source 사용 (지정가 = price_source 추출 가격).
// - PricingMakerTaker: pricer leg 가 price_source 로 ref 추출 → fair 산출. maker quote = fair 그대로.
// - BaseMakeCounterIocAndBalance (IOC imbalance):
//   - base.side / base.quantity: 사용 (deficit 트리거 방향 / 사이클 base 주문 수량).
//   - counter.side: 사용자가 직접 지정 (정방향 ETF → base.side 반대, 역방향 ETF → base.side 와 동일).
//   - counter.quantity: 무시 (런타임 = base.quantity × hedge_ratio).
//   - price_source (양 leg): 무시. base 가격 = base.side 1호가(=BestMake) 고정,
//     counter 가격 = NAV 기반 BEP 고정. 사용자가 지정해도 서버에서 UNSPECIFIED 로 정규화.
message PairEntry {
  // 종목 심볼
  string symbol = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 주문에 사용할 펀드 코드
  string fund_code = 2 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 주문 방향
  PairSide side = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 주문 수량 (1 이상)
  // BMC 모드: base 는 필수(사이클 주문 수량), counter 는 0 허용(런타임 = base × hedge_ratio).
  int64 quantity = 4 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 참조 가격 소스 (entry.side 기준 자기/상대 호가).
  // BMC 모드에선 무시(base 가격은 항상 base.side 의 1호가). 입력값은 UNSPECIFIED 로 정규화된다.
  PriceSource price_source = 5;

  // 사용 안 함 — 과거에 지정가 산출 시 tick offset 으로 쓰였으나 기능 삭제.
  reserved 6;
  reserved "price_offset_ticks";
}

// 주문 방향
enum PairSide {
  PAIR_SIDE_UNSPECIFIED = 0;
  // 매수
  PAIR_SIDE_BID = 1;
  // 매도
  PAIR_SIDE_ASK = 2;
}

// 참조 가격 소스 (entry.side 기준 자기/상대 호가).
enum PriceSource {
  PRICE_SOURCE_UNSPECIFIED = 0;
  // 사용 안 함 — 과거 변형 (MidPrice, LastPrice, BestBid, BestAsk) 삭제 후 reserved.
  reserved 1, 2, 3, 4;
  reserved "PRICE_SOURCE_MID_PRICE", "PRICE_SOURCE_LAST_PRICE", "PRICE_SOURCE_BEST_BID", "PRICE_SOURCE_BEST_ASK";
  // 자기호가 (entry.side 와 같은 방향의 1호가). Bid 주문 → bid1, Ask 주문 → ask1.
  PRICE_SOURCE_BEST_MAKE = 5;
  // 상대호가 (entry.side 반대 방향의 1호가). Bid 주문 → ask1, Ask 주문 → bid1.
  PRICE_SOURCE_BEST_TAKE = 6;
}

// ============================================================================
// Pair Condition (oneof wrapper)
// ============================================================================

// 페어 가격 비교 조건 (세 가지 variant 중 하나)
message PairCondition {
  oneof kind {
    // 절대 스프레드 금액 기준
    SpreadAmountCondition spread_amount = 1;
    // 상대 스프레드 (bps) 기준
    SpreadBpsCondition spread_bps = 2;
    // 가격 비율 기준
    PriceRatioCondition price_ratio = 3;
  }
}

// 절대 스프레드 금액 조건 (|base - counter| >= threshold)
message SpreadAmountCondition {
  // 스프레드 임계값 (원, 1 이상)
  int64 threshold = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 트리거 방향
  SpreadDirection direction = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// 상대 스프레드 (bps) 조건 (|spread| / mid * 10000 >= threshold_bps, base 기준)
message SpreadBpsCondition {
  // 스프레드 임계값 (bps, 1bp = 0.01%)
  double threshold_bps = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 트리거 방향
  SpreadDirection direction = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// 가격 비율 조건 (base / counter)
message PriceRatioCondition {
  // 최소 비율 (이 값 미만이면 CounterHigh 트리거)
  double min_ratio = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 최대 비율 (이 값 초과 시 BaseHigh 트리거)
  double max_ratio = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// 스프레드 방향 (어느 쪽이 비쌀 때 트리거할지)
enum SpreadDirection {
  SPREAD_DIRECTION_UNSPECIFIED = 0;
  // Base가 비쌀 때만 트리거
  SPREAD_DIRECTION_BASE_HIGH = 1;
  // Counter가 비쌀 때만 트리거
  SPREAD_DIRECTION_COUNTER_HIGH = 2;
  // 양방향
  SPREAD_DIRECTION_BOTH = 3;
}

// 페어 주문 유형
enum PairOrderType {
  PAIR_ORDER_TYPE_UNSPECIFIED = 0;
  // 지정가
  PAIR_ORDER_TYPE_LIMIT = 1;
  // 시장가
  PAIR_ORDER_TYPE_MARKET = 2;
  // 공격적 지정가 (상대 최우선 호가 기반)
  PAIR_ORDER_TYPE_AGGRESSIVE = 3;
}

// ============================================================================
// Pair Status
// ============================================================================

// Pair 상태
enum PairStatus {
  PAIR_STATUS_UNSPECIFIED = 0;
  // 운영 중 (hot loop 동작)
  PAIR_STATUS_ACTIVE = 1;
  // 일시 중지
  PAIR_STATUS_PAUSED = 2;
  // 보관 (더 이상 사용 안 함)
  PAIR_STATUS_ARCHIVED = 3;
}

// ============================================================================
// Pair Mode (oneof wrapper)
// ============================================================================

// Pair 실행 모드
message PairMode {
  oneof kind {
    // 기존 동작: 두 시세 비교 후 조건 충족 시 양측 동시 발주
    SimultaneousCompare simultaneous_compare = 1;
    // 신규: pricer 시세 기반 maker 호가 유지 + 체결 시 taker 헷지
    PricingMakerTaker pricing_maker_taker = 2;
    // 신규: base maker 호가 유지, counter IOC 헷지 + 잔량 추적 처리
    BaseMakeCounterIocAndBalance base_make_counter_ioc_and_balance = 3;
    // 신규: base 무발주 — counter(ETF)만 BEP 지정가 진입 후 익절/손절 청산
    CounterBepScalp counter_bep_scalp = 4;
  }
}

// BaseMakeCounterIocAndBalance 모드 설정 (IOC imbalance hotpath)
//
// PairEntry 필드 매핑:
//   - base.symbol / base.fund_code / base.side / base.quantity: 사용 (필수).
//   - counter.symbol / counter.fund_code / counter.side: 사용 (필수, 사용자가 직접 지정).
//     정방향 ETF → counter.side = base.side 반대, 역방향 ETF → counter.side = base.side 와 동일.
//   - counter.quantity: 무시 (런타임 = base.quantity × hedge_ratio). 0 으로 비워도 된다.
//   - PairEntry.price_source (양 leg): 무시. base 가격은 base.side 의 1호가(=BestMake),
//     counter 가격은 NAV 기반 BEP. 서버에서 UNSPECIFIED 로 정규화한다.
message BaseMakeCounterIocAndBalance {
  reserved 1;
  reserved "pricing";

  reserved 2;
  reserved "hedge_ratio";

  reserved 3;
  reserved "counter_inverse";

  // IOC 발주 시 불균형 감지 임계 비율 (잔량 / 목표수량, 이 값 초과 시 재발주)
  double imbalance_threshold_ratio = 4;

  // 불균형 회복 목표 비율 (재발주 시 목표 충족 비율)
  double imbalance_recovery_ratio = 5;

  // 결제(settle) 타임아웃 (ms, 이 시간 내 미결제 시 경보)
  uint64 settle_timeout_ms = 6;

  // 잔량 조정 경보 임계값 (원, 이 금액 초과 시 경보 로그)
  int64 reconcile_alert_amount = 7;

  // 트리거 후 재트리거까지 대기시간 (ms)
  uint64 cooldown_ms = 8;

  // NAV 계산 공식 종류 (서버 런타임에 PricingContext 엔티티 조회, proto엔 종류만 지정)
  EtfNavKind nav_kind = 9;

  // Bid quote 산출용 basis 오프셋 (원, raw int64)
  int64 bid_basis = 10;

  // Ask quote 산출용 basis 오프셋 (원, raw int64)
  int64 ask_basis = 11;

  // base leg 공격적 정정 시 상대호가(cross price) 보다 얼마나 더 공격적으로 낼지 (tick 단위).
  // 적용처:
  //   - base 측 imbalance 복구 amend — base.side 의 cross 가격 기준.
  //   - 종단 base cover (balance_fill AddBase) — base 평균 체결가 기준.
  // 0 이면 상대호가/ref 그대로. Bid 면 +N*tick, Ask 면 -N*tick.
  uint32 base_recovery_aggressive_ticks = 12;

  // counter leg 공격적 정정 시 상대호가에서 얼마나 더 공격적으로 낼지 (tick 단위).
  // 적용처: 종단 counter cover (balance_fill AddCounter) — counter_bep 기준.
  // 0 이면 BEP 그대로. counter.side 가 Bid 면 +N*tick, Ask 면 -N*tick.
  uint32 counter_recovery_aggressive_ticks = 13;
}

// CounterBepScalp 모드 설정
//
// base 레그 무발주 — counter(ETF)만 BEP 지정가(FAS)로 진입하고,
// 진입 BEP 대비 유리 방향 take_profit_ticks 틱 이상이면 익절,
// 불리 방향 stop_loss_ticks 틱 이상이면 손절 청산한다.
// 트리거는 base(선물) 1호가 수량 imbalance (BaseMakeCounterIocAndBalance 와 동일 판정).
// 진입 주문은 취소 없이 대기하며, 익절/손절 발동 시점에만 잔량을 취소한다.
// 청산 주문은 체결될 때까지 호가를 추적(amend)해 체결을 보장한다.
message CounterBepScalp {
  // counter(ETF) BEP 환산용 NAV 방식
  EtfNavKind nav_kind = 1;

  // counter 매수(Bid) BEP 오프셋 (원)
  int64 bid_basis = 2;

  // counter 매도(Ask) BEP 오프셋 (원)
  int64 ask_basis = 3;

  // 진입 트리거: base 1호가 imbalance 가 이 비율 미만이면 발사
  double imbalance_threshold_ratio = 4;

  // 트리거 후 재트리거까지 대기시간 (ms)
  uint64 cooldown_ms = 5;

  // 익절 임계 (틱). 진입 BEP 대비 유리 방향
  uint32 take_profit_ticks = 6;

  // 손절 임계 (틱). 진입 BEP 대비 불리 방향
  uint32 stop_loss_ticks = 7;

  // 청산 발주 시 상대 1호가에서 추가로 공격적으로 낼 틱 수 (0 = 상대호가 그대로)
  uint32 exit_aggressive_ticks = 8;
}

// SimultaneousCompare 모드 설정
message SimultaneousCompare {
  // 가격 비교 조건
  PairCondition condition = 1;

  // 주문 유형
  PairOrderType order_type = 2;

  // 트리거 후 재트리거까지 대기시간 (ms)
  uint64 cooldown_ms = 3;

  // hit 직후 지정가 조정 여부
  bool apply_tick_offset = 4;
}

// PricingMakerTaker 모드 설정
message PricingMakerTaker {
  // maker 역할 leg (BASE or COUNTER; 반대 leg가 pricer 겸 taker)
  PairLeg maker_leg = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // pricer → maker 가격 환산 방식
  PairPricingMethod pricing = 2 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 정정(retick) 정책
  RetickPolicy retick = 3;

  // taker(헷지) 측 주문 유형
  PairOrderType taker_order_type = 4;
}

// Pair leg 식별자
enum PairLeg {
  PAIR_LEG_UNSPECIFIED = 0;
  PAIR_LEG_BASE = 1;
  PAIR_LEG_COUNTER = 2;
}

// ============================================================================
// Pair Pricing Method (oneof wrapper)
// ============================================================================

// pricer 가격으로부터 maker fair price를 산출하는 방식
message PairPricingMethod {
  oneof method {
    // 선형 환산: maker_price = pricer_price * multiple + basis(side)
    LinearBasis linear_basis = 1;
    // ETF NAV 기반 환산 (ETF↔선물 비선형 케이스)
    EtfNav etf_nav = 2;
  }
}

// 선형 환산 방식
message LinearBasis {
  // 배율 (예: 1.0, non-zero finite)
  double multiple = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Bid quote 산출용 basis 오프셋 (원)
  int64 basis_bid = 2;

  // Ask quote 산출용 basis 오프셋 (원)
  int64 basis_ask = 3;
}

// ETF NAV 기반 환산 방식
message EtfNav {
  // NAV 계산 공식 종류
  EtfNavKind pricing_kind = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 환산 방향 (Inverse: pricer=ETF→maker=선물, Forward: pricer=선물→maker=ETF)
  NavDirection direction = 2 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 정적 pricing 파라미터 snapshot
  PricingContextSnapshot ctx = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Bid quote 산출용 basis (원, raw int64)
  int64 bid_basis = 4;

  // Ask quote 산출용 basis (원, raw int64)
  int64 ask_basis = 5;

  // PDF/Pdf fallback용 선형 배율 (inverse 모드, 기본 1.0)
  double linear_fallback_multiplier = 6;

  // FutureBasis/LeverageFuture variant의 전일 기초지수 가격 (원, raw int64)
  // EtfNavKind가 FUTURE_BASIS 또는 LEVERAGE_FUTURE일 때 필수
  int64 prev_index = 7;

  // LeverageFuture variant의 전일 선물 가격 (원, raw int64)
  // EtfNavKind가 LEVERAGE_FUTURE일 때 필수
  int64 prev_future = 8;
}

// ETF NAV 계산 공식 종류
// (PdfNavHedge/PdfDecomposeHedge는 Pair 미지원 — 서버에서 거부됨)
enum EtfNavKind {
  ETF_NAV_KIND_UNSPECIFIED = 0;
  // 지수 추종 헷지 프라이싱: (future + basis) * multiple + cash
  ETF_NAV_KIND_INDEX_TRACKING_HEDGE = 1;
  // 선물 베이시스 기반: unit_delta * future / (prev_index + basis) + cash
  ETF_NAV_KIND_FUTURE_BASIS = 2;
  // 레버리지/인버스 ETF용 선물 기반
  ETF_NAV_KIND_LEVERAGE_FUTURE = 3;
}

// NAV 환산 방향
enum NavDirection {
  NAV_DIRECTION_UNSPECIFIED = 0;
  // pricer=ETF → maker=선물 가격 역산
  NAV_DIRECTION_INVERSE = 1;
  // pricer=선물 → maker=ETF NAV forward 산출
  NAV_DIRECTION_FORWARD = 2;
}

// PricingContext 정적 파라미터 snapshot
// (Price 타입은 i64 raw value 기반 — int64로 직렬화)
message PricingContextSnapshot {
  // 전일 NAV (LeverageFuture의 nav0)
  int64 nav0 = 1;

  // 바스켓 내 현물(Stock/ETF) 비중 (0.0 ~ 1.0)
  double stock_ratio = 2;

  // 실질 레버리지 (= unit_delta / Nav0, 인버스면 부호 반전)
  double actual_leverage = 3;

  // 단위 델타 (unit_delta)
  int64 unit_delta = 4;

  // 주당 현금 (cash_per_share)
  int64 cash_per_share = 5;

  // 지수 추종 배율 (IndexTrackingHedge 시 필수, 그 외 미사용)
  optional int64 tracking_multiple = 6;
}

// ============================================================================
// Retick Policy
// ============================================================================

// maker 정정(amend) 정책
message RetickPolicy {
  // fair 가격이 이 tick 수 이상 이동해야 정정 (1 이상)
  int32 tick_threshold = 1;

  // 직전 정정으로부터 이만큼 경과해야 다음 정정 허용 (ms)
  uint64 amend_cooldown_ms = 2;

  // stop 시 미체결 maker 주문 자동 취소 여부
  bool cancel_on_stop = 3;
}


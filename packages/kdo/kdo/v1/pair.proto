// ============================================================================
// Pair Execution Log (SimultaneousCompare 모드 사이클별 기록)
// ============================================================================

// 페어 실행 로그 레코드
message PairExecutionLog {
  // Pair ID
  int32 pair_id = 1;

  // 시그널 시나리오 (예: "BASE_HIGH", "COUNTER_HIGH")
  string scenario = 2;

  // 실행 결과
  PairExecutionOutcome outcome = 3;

  // Base 측 주문 ID (발주 성공 시)
  optional uint64 base_order_id = 4;

  // Counter 측 주문 ID (발주 성공 시)
  optional uint64 counter_order_id = 5;

  // Base 참조 가격 (원, raw int64)
  int64 base_price = 6;

  // Counter 참조 가격 (원, raw int64)
  int64 counter_price = 7;

  // 스프레드 (base - counter, 원, raw int64)
  int64 spread = 8;

  // 발주 시각
  google.protobuf.Timestamp dispatched_at = 9;

  // 상세 내용 (오류 메시지 등, optional)
  optional string detail = 10;

  // Base 레그 최종 체결 수량
  int64 base_qty = 11;

  // Counter 레그 최종 체결 수량
  int64 counter_qty = 12;

  // Base 레그 실제 평균 체결가 (원, raw int64; 미체결이면 0)
  int64 base_fill_price = 13;

  // Counter 레그 실제 평균 체결가 (원, raw int64; 미체결이면 0)
  int64 counter_fill_price = 14;

  // IOC 모드에서 트리거 마켓데이터 수신 시점부터 base 최초 주문 제출 직후까지의 경과 (us)
  // 비IOC 모드 또는 미적용 시 0
  int64 trigger_to_base_submit_us = 15;

  // IOC 모드에서 트리거 마켓데이터 수신 시점부터 counter 최초 주문 제출 직후까지의 경과 (us)
  // 비IOC 모드 또는 미적용 시 0
  int64 trigger_to_counter_submit_us = 16;
}

// 페어 실행 결과
enum PairExecutionOutcome {
  PAIR_EXECUTION_OUTCOME_UNSPECIFIED = 0;
  // 발주 성공
  PAIR_EXECUTION_OUTCOME_SUBMITTED = 1;
  // 사전 검증 실패로 스킵
  PAIR_EXECUTION_OUTCOME_SKIPPED_PRE_VALIDATION = 2;
  // 쿨다운 중 스킵
  PAIR_EXECUTION_OUTCOME_SKIPPED_COOLDOWN = 3;
  // 사전 계산 없음으로 스킵
  PAIR_EXECUTION_OUTCOME_SKIPPED_NO_PRECOMPUTED = 4;
  // 한쪽만 발주 성공 (부분 실패)
  PAIR_EXECUTION_OUTCOME_PARTIAL_FAILURE = 5;
  // 전체 실패
  PAIR_EXECUTION_OUTCOME_FAILED = 6;
  // 체결 수량 없음으로 스킵 (filled qty = 0)
  PAIR_EXECUTION_OUTCOME_SKIPPED_NO_FILLED = 7;
}

message ListPairExecutionLogsRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];

  // 페이지 크기 (기본: 50, 최대: 200)
  optional int32 page_size = 2;

  // 페이지 토큰 (다음 페이지 조회용)
  optional string page_token = 3;

  // 정렬 기준 (기본: dispatched_at DESC)
  string order_by = 4 [
    (google.api.field_behavior) = OPTIONAL
  ];

  // outcome 필터 (UNSPECIFIED = 전체, 그 외 값이면 해당 outcome만 반환)
  PairExecutionOutcome outcome = 5;
}

message ListPairExecutionLogsResponse {
  // 실행 로그 목록
  repeated PairExecutionLog execution_logs = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;

  // 전체 건수
  int32 total_count = 3;
}

// ============================================================================
// Maker-Taker Event Log (PricingMakerTaker 모드 전용)
// ============================================================================

// Maker-Taker 이벤트 로그 레코드
message MakerTakerEventLog {
  // Pair ID
  int32 pair_id = 1;

  // 이벤트 유형
  MakerTakerEventType event_type = 2;

  // 사이클 식별자 (동일 사이클의 이벤트를 묶음)
  int64 cycle_id = 3;

  // maker 주문 ID (해당 이벤트에서 참조 가능한 경우)
  optional uint64 maker_order_id = 4;

  // taker 주문 ID (TakerSubmitted / TakerFilled 시점)
  optional uint64 taker_order_id = 5;

  // 해당 이벤트 시점의 maker fair price (원, raw int64)
  optional int64 fair_price = 6;

  // 정정 시 새 호가 (MakerAmended 전용, 원, raw int64)
  optional int64 new_price = 7;

  // 체결 가격 (MakerFilled / TakerFilled, 원, raw int64)
  optional int64 fill_price = 8;

  // 체결 수량 (MakerFilled / TakerFilled)
  optional int64 fill_quantity = 9;

  // 이벤트 발생 시각
  google.protobuf.Timestamp at = 10;

  // 상세 내용 (optional)
  optional string detail = 11;
}

// Maker-Taker 이벤트 유형
enum MakerTakerEventType {
  MAKER_TAKER_EVENT_TYPE_UNSPECIFIED = 0;
  // maker 신규 발주 (FEP submit 직후)
  MAKER_TAKER_EVENT_TYPE_MAKER_SUBMITTED = 1;
  // maker 정정 (가격/수량 변경)
  MAKER_TAKER_EVENT_TYPE_MAKER_AMENDED = 2;
  // maker 부분/완전 체결
  MAKER_TAKER_EVENT_TYPE_MAKER_FILLED = 3;
  // maker 주문 reject
  MAKER_TAKER_EVENT_TYPE_MAKER_REJECTED = 4;
  // maker 주문 거래소 auto-cancel
  MAKER_TAKER_EVENT_TYPE_MAKER_CANCELLED = 5;
  // taker 헷지 주문 발주
  MAKER_TAKER_EVENT_TYPE_TAKER_SUBMITTED = 6;
  // taker 헷지 체결
  MAKER_TAKER_EVENT_TYPE_TAKER_FILLED = 7;
  // taker 헷지 reject (수동 개입 필요)
  MAKER_TAKER_EVENT_TYPE_TAKER_REJECTED = 8;
}

message ListMakerTakerEventsRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];

  // 페이지 크기 (기본: 50, 최대: 200)
  optional int32 page_size = 2;

  // 페이지 토큰 (다음 페이지 조회용)
  optional string page_token = 3;

  // 필터링 조건 (optional)
  //
  // Available Fields:
  // * cycle_id - 사이클 ID
  // * event_type - 이벤트 유형
  string filter = 4 [
    (google.api.field_behavior) = OPTIONAL
  ];

  // 정렬 기준 (기본: at DESC)
  string order_by = 5 [
    (google.api.field_behavior) = OPTIONAL
  ];
}

message ListMakerTakerEventsResponse {
  // 이벤트 로그 목록
  repeated MakerTakerEventLog events = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;

  // 전체 건수
  int32 total_count = 3;
}

// ============================================================================
// Real-time Status Streaming
// ============================================================================

// StreamPairStatus 요청
message StreamPairStatusRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];
}

// 페어 단일 leg 실시간 상태 스냅샷
// (태그 번호는 클라이언트 UI 계약으로 보존됨)
message LegStatus {
  // 미체결 수량 (submitted - filled)
  int64 unfilled_quantity = 1;
  // 누적 체결 수량 (현재 세션 메모리 카운터, 재시작 시 0)
  int64 filled_quantity = 2;
  // 체결 VWAP (milli-won 단위)
  int64 avg_fill_price = 3;
  // 누적 발주 수량 (현재 세션 메모리 카운터)
  int64 submitted_quantity = 4;
}

// StreamPairStatus 스트리밍 응답 — 페어 상태 스냅샷
message PairStatusUpdate {
  // 리소스 이름 (pairs/{id})
  string pair = 1;
  // Base leg 상태
  LegStatus base = 2;
  // Counter leg 상태
  LegStatus counter = 3;
  // 스냅샷 시각
  google.protobuf.Timestamp updated_at = 4;
}

// ============================================================================
// Pair Statistics
// ============================================================================

// GetPairStatistics 요청
message GetPairStatisticsRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];
}

// 페어 누적 통계 스냅샷 (인메모리 카운터 기반)
message PairStatistics {
  // 리소스 이름 (pairs/{id})
  string pair = 1;
  // base + counter 누적 발주 수량
  int64 total_submitted = 2;
  // base + counter 누적 체결 수량
  int64 total_filled = 3;
  // Spread 모드: 발주 성공 횟수 / PricingMakerTaker 모드: 사이클 수
  int64 execution_count = 4;
  // 실현 손익 (milli-won). 현재 메모리 카운터 기반, Spread 모드는 0.
  int64 realized_pnl = 5;
}

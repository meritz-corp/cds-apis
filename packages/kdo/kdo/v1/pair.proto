syntax = "proto3";

package kdo.v1.pair;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/resource.proto";
import "google/api/client.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// PairService - 두 심볼의 가격 조건에 따른 동시 주문 전략 관리 서비스
service PairService {
  // 단일 Pair 조회
  rpc GetPair(GetPairRequest) returns (Pair) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 목록 조회 (페이징 + 필터)
  rpc ListPairs(ListPairsRequest) returns (ListPairsResponse) {
    option (google.api.http) = {
      get: "/v1/pairs"
    };
    option (google.api.method_signature) = "";
  }

  // Pair 생성
  rpc CreatePair(CreatePairRequest) returns (Pair) {
    option (google.api.http) = {
      post: "/v1/pairs"
      body: "pair"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 수정
  rpc UpdatePair(UpdatePairRequest) returns (Pair) {
    option (google.api.http) = {
      patch: "/v1/{pair.name=pairs/*}"
      body: "pair"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 삭제
  rpc DeletePair(DeletePairRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{pair=pairs/*}"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 활성화 (status → ACTIVE, hot loop 시작)
  rpc ActivatePair(ActivatePairRequest) returns (Pair) {
    option (google.api.http) = {
      post: "/v1/{pair=pairs/*}:activate"
      body: "*"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 일시 중지 (hot loop 중지, status → PAUSED)
  rpc PausePair(PausePairRequest) returns (Pair) {
    option (google.api.http) = {
      post: "/v1/{pair=pairs/*}:pause"
      body: "*"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 실행 로그 목록 조회 (사이클별 기록, 페이징)
  rpc ListPairExecutionLogs(ListPairExecutionLogsRequest) returns (ListPairExecutionLogsResponse) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}/executionLogs"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 실시간 슬롯 상태 스트리밍 (카운터 변경 시마다 emit)
  rpc StreamPairStatus(StreamPairStatusRequest) returns (stream PairStatusUpdate) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}:streamStatus"
    };
    option (google.api.method_signature) = "pair";
  }

  // Pair 누적 통계 스냅샷 조회 (인메모리 카운터 기반)
  rpc GetPairStatistics(GetPairStatisticsRequest) returns (PairStatistics) {
    option (google.api.http) = {
      get: "/v1/{pair=pairs/*}/statistics"
    };
    option (google.api.method_signature) = "pair";
  }
}

// ============================================================================
// Pair Entity
// ============================================================================

// Pair 전략 — 두 심볼의 가격 조건에 따른 동시 주문 설정
message Pair {
  option (google.api.resource) = {
    type: "kdo.cdsapis.xyz/Pair"
    pattern: "pairs/{pair}"
  };

  // 리소스 이름 (pairs/{id})
  string name = 1;

  // Pair ID
  int32 id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 전략 이름 (고유)
  string display_name = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Portfolio ID
  int32 portfolio_id = 4 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Base 엔트리
  PairEntry base = 5 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Counter 엔트리
  PairEntry counter = 6 [
    (google.api.field_behavior) = REQUIRED
  ];

  reserved 7;
  reserved "condition";

  reserved 8;
  reserved "exec_config";

  // 상태
  PairStatus status = 9 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 구 PairMode 필드 — 제거됨 (예약)
  reserved 10;
  reserved "mode";

  // 생성 시간
  google.protobuf.Timestamp create_time = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 수정 시간
  google.protobuf.Timestamp update_time = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 트리거 — 언제 발사할지. 실행(execution)과 독립적으로 조합한다.
  TriggerCondition trigger = 13;

  // 실행 — 발사 시 무엇을 할지. 트리거(trigger)와 독립적으로 조합한다.
  OrderExecution execution = 14;

  // ETF↔Future NAV 환산 설정 — TargetNavQuantityImbalance 트리거·BaseMakeCounterIocAndBalance/CounterIocTpSlExecution
  // execution 이 공유. NAV 미사용 페어는 미설정.
  Nav nav = 15;
}

// ============================================================================
// Pair Entry
// ============================================================================

// 페어의 한쪽 엔트리 (단일 심볼 주문 스펙)
//
// execution 종류별 필드 사용:
// - DualSubmitExecution: side/quantity/price_source 사용 (지정가 = price_source 추출 가격).
// - BaseMakeCounterIocAndBalanceExecution (IOC imbalance):
//   - base.side / base.quantity: 사용 (deficit 트리거 방향 / 사이클 base 주문 수량).
//   - counter.side: 사용자가 직접 지정 (정방향 ETF → base.side 반대, 역방향 ETF → base.side 와 동일).
//   - counter.quantity: 무시 (런타임 = base.quantity × hedge_ratio).
//   - price_source (양 슬롯): 무시. base 가격 = base.side 1호가(=BestMake) 고정,
//     counter 가격 = NAV 기반 BEP 고정. 사용자가 지정해도 서버에서 UNSPECIFIED 로 정규화.
// - CounterIocTpSlExecution: counter 엔트리만 사용.
message PairEntry {
  // 종목 심볼
  string symbol = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 주문에 사용할 펀드 코드
  string fund_code = 2 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 주문 방향
  PairSide side = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 주문 수량 (1 이상)
  // BaseMakeCounterIocAndBalanceExecution: base 는 필수(사이클 주문 수량), counter 는 0 허용(런타임 = base × hedge_ratio).
  int64 quantity = 4 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 참조 가격 소스 (entry.side 기준 자기/상대 호가).
  // BaseMakeCounterIocAndBalanceExecution 에선 무시(base 가격은 항상 base.side 의 1호가). 입력값은 UNSPECIFIED 로 정규화된다.
  PriceSource price_source = 5;

  // 사용 안 함 — 과거에 지정가 산출 시 tick offset 으로 쓰였으나 기능 삭제.
  reserved 6;
  reserved "price_offset_ticks";
}

// 주문 방향
enum PairSide {
  PAIR_SIDE_UNSPECIFIED = 0;
  // 매수
  PAIR_SIDE_BID = 1;
  // 매도
  PAIR_SIDE_ASK = 2;
}

// 참조 가격 소스 (entry.side 기준 자기/상대 호가).
enum PriceSource {
  PRICE_SOURCE_UNSPECIFIED = 0;
  // 사용 안 함 — 과거 변형 (MidPrice, LastPrice, BestBid, BestAsk) 삭제 후 reserved.
  reserved 1, 2, 3, 4;
  reserved "PRICE_SOURCE_MID_PRICE", "PRICE_SOURCE_LAST_PRICE", "PRICE_SOURCE_BEST_BID", "PRICE_SOURCE_BEST_ASK";
  // 자기호가 (entry.side 와 같은 방향의 1호가). Bid 주문 → bid1, Ask 주문 → ask1.
  PRICE_SOURCE_BEST_MAKE = 5;
  // 상대호가 (entry.side 반대 방향의 1호가). Bid 주문 → ask1, Ask 주문 → bid1.
  PRICE_SOURCE_BEST_TAKE = 6;
}

// ============================================================================
// Pair Condition (oneof wrapper)
// ============================================================================

// 페어 가격 비교 조건 (세 가지 variant 중 하나)
message PairCondition {
  oneof kind {
    // 절대 스프레드 금액 기준
    SpreadAmountCondition spread_amount = 1;
    // 상대 스프레드 (bps) 기준
    SpreadBpsCondition spread_bps = 2;
    // 가격 비율 기준
    PriceRatioCondition price_ratio = 3;
  }
}

// 절대 스프레드 금액 조건 (|base - counter| >= threshold)
message SpreadAmountCondition {
  // 스프레드 임계값 (원, 1 이상)
  int64 threshold = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 트리거 방향
  SpreadDirection direction = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// 상대 스프레드 (bps) 조건 (|spread| / mid * 10000 >= threshold_bps, base 기준)
message SpreadBpsCondition {
  // 스프레드 임계값 (bps, 1bp = 0.01%)
  double threshold_bps = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 트리거 방향
  SpreadDirection direction = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// 가격 비율 조건 (base / counter)
message PriceRatioCondition {
  // 최소 비율 (이 값 미만이면 CounterHigh 트리거)
  double min_ratio = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 최대 비율 (이 값 초과 시 BaseHigh 트리거)
  double max_ratio = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// 스프레드 방향 (어느 쪽이 비쌀 때 트리거할지)
enum SpreadDirection {
  SPREAD_DIRECTION_UNSPECIFIED = 0;
  // Base가 비쌀 때만 트리거
  SPREAD_DIRECTION_BASE_HIGH = 1;
  // Counter가 비쌀 때만 트리거
  SPREAD_DIRECTION_COUNTER_HIGH = 2;
  // 양방향
  SPREAD_DIRECTION_BOTH = 3;
}

// 페어 주문 유형
enum PairOrderType {
  PAIR_ORDER_TYPE_UNSPECIFIED = 0;
  // 지정가
  PAIR_ORDER_TYPE_LIMIT = 1;
  // 시장가
  PAIR_ORDER_TYPE_MARKET = 2;
  // 공격적 지정가 (상대 최우선 호가 기반)
  PAIR_ORDER_TYPE_AGGRESSIVE = 3;
}

// ============================================================================
// Pair Status
// ============================================================================

// Pair 상태
enum PairStatus {
  PAIR_STATUS_UNSPECIFIED = 0;
  // 운영 중 (hot loop 동작)
  PAIR_STATUS_ACTIVE = 1;
  // 일시 중지
  PAIR_STATUS_PAUSED = 2;
  // 보관 (더 이상 사용 안 함)
  PAIR_STATUS_ARCHIVED = 3;
}

// ============================================================================
// ETF NAV Kind
// ============================================================================

// ETF NAV 계산 공식 종류
enum EtfNavKind {
  ETF_NAV_KIND_UNSPECIFIED = 0;
  // 지수 추종 헷지 프라이싱: (future + basis) * multiple + cash
  ETF_NAV_KIND_INDEX_TRACKING_HEDGE = 1;
  // 선물 베이시스 기반: unit_delta * future / (prev_index + basis) + cash
  ETF_NAV_KIND_FUTURE_BASIS = 2;
  // 레버리지/인버스 ETF용 선물 기반
  ETF_NAV_KIND_LEVERAGE_FUTURE = 3;
  // PDF 구성종목 기반 헷지 프라이싱 (단일 선물 구성종목 전제, flatten 필수)
  ETF_NAV_KIND_PDF_DECOMPOSE_HEDGE = 4;
}

// ETF↔Future 페어의 NAV 환산 설정 — 트리거(TargetNav)와 실행(counter BEP)이 공유.
// base/counter 중 한쪽이 ETF, 다른쪽이 Future 여야 한다 (방향 무관).
message Nav {
  EtfNavKind nav_kind = 1;
  // Bid 방향 산출용 basis (원). forward/inverse 양방향에 동일 모델 파라미터로 적용.
  int64 bid_basis = 2;
  // Ask 방향 산출용 basis (원)
  int64 ask_basis = 3;
}

// ============================================================================
// TriggerCondition — 트리거 축
// ============================================================================

// 트리거 — 언제 발사할지. 실행(OrderExecution)과 독립적으로 조합한다.
message TriggerCondition {
  oneof kind {
    // 양 슬롯 참조가격 비교 트리거 (구 SimultaneousCompare 의 트리거부)
    PriceSpreadTrigger price_spread = 1;
    // base 자기측(BestMake) 1호가 수량 불균형 트리거. base.side 가 담당 deficit 방향.
    BestMakeQuantityImbalanceTrigger best_make_quantity_imbalance = 2;
    // counter 시세로 base 의 NAV 목표가를 환산해, base 자기측(BestMake) 1호가가
    // 목표가와 정확히 일치하면서 수량 불균형일 때 발사. nav 파라미터는 Pair.nav 공유 설정 사용.
    TargetNavQuantityImbalanceTrigger target_nav_quantity_imbalance = 3;
  }
}

// 양 슬롯 참조가격 비교 트리거
message PriceSpreadTrigger {
  // 가격 비교 조건
  PairCondition condition = 1;
  // 트리거 후 재트리거까지 대기시간 (ms)
  uint64 cooldown_ms = 2;
}

// base 자기측(BestMake) 1호가 수량 불균형 트리거. base.side 가 담당 deficit 방향.
message BestMakeQuantityImbalanceTrigger {
  // base 1호가 imbalance 가 이 비율 미만이면 트리거
  double threshold_ratio = 1;
  // 트리거 후 재트리거까지 대기시간 (ms)
  uint64 cooldown_ms = 2;
}

// counter 시세로 base 의 NAV 목표가를 환산해, base 자기측(BestMake) 1호가가
// 목표가와 정확히 일치하면서 수량 불균형일 때 발사. nav 파라미터는 Pair.nav 공유 설정 사용.
message TargetNavQuantityImbalanceTrigger {
  // 수량 불균형 임계 (BestMakeQuantityImbalanceTrigger 와 동일 판정식)
  double threshold_ratio = 1;
  // 트리거 후 재트리거까지 대기시간 (ms)
  uint64 cooldown_ms = 2;
}

// ============================================================================
// OrderExecution — 실행 축
// ============================================================================

// 실행 — 발사 시 무엇을 할지. 트리거와 독립적으로 조합한다.
message OrderExecution {
  oneof kind {
    // 양측 동시 발주 (구 SimultaneousCompare 의 실행부)
    DualSubmitExecution dual_submit = 1;
    // base Limit + counter IOC + settle/recovery/balance
    BaseMakeCounterIocAndBalanceExecution base_make_counter_ioc_and_balance = 2;
    // base 무발주 — counter(ETF) 상대호가±entry_aggressive_ticks pseudo-IOC 진입 + TP/SL 청산
    CounterIocTpSlExecution counter_ioc_tp_sl = 3;
    // base Limit + counter 잔류지정가(상대호가±틱, IOC 아님) + settle/recovery/balance
    BaseMakeCounterTakeAndBalanceExecution base_make_counter_take_and_balance = 4;
  }
}

// 양측 동시 발주 (구 SimultaneousCompare 의 실행부)
message DualSubmitExecution {
  // 주문 유형
  PairOrderType order_type = 1;
}

// base Limit + counter IOC + settle/recovery/balance
//
// PairEntry 필드 매핑:
//   - base.symbol / base.fund_code / base.side / base.quantity: 사용 (필수).
//   - counter.symbol / counter.fund_code / counter.side: 사용 (필수, 사용자가 직접 지정).
//     정방향 ETF → counter.side = base.side 반대, 역방향 ETF → counter.side = base.side 와 동일.
//   - counter.quantity: 무시 (런타임 = base.quantity × hedge_ratio). 0 으로 비워도 된다.
//   - PairEntry.price_source (양 슬롯): 무시. base 가격은 base.side 의 1호가(=BestMake),
//     counter 가격은 NAV 기반 BEP. 서버에서 UNSPECIFIED 로 정규화한다.
message BaseMakeCounterIocAndBalanceExecution {
  // nav_kind / bid_basis / ask_basis 는 Pair.nav 로 이동 — reserved
  reserved 1, 2, 3;
  reserved "nav_kind", "bid_basis", "ask_basis";
  // base 측 잔량 비율이 이 값을 초과하면 base 공격적 정정→강제 체결
  double recovery_ratio = 4;
  // settle_timeout_ms / reconcile_alert_amount 제거 (코드 상수로 대체) — reserved
  reserved 5, 6;
  reserved "settle_timeout_ms", "reconcile_alert_amount";
  // base 슬롯 공격적 정정 시 상대호가(cross price) 보다 얼마나 더 공격적으로 낼지 (tick 단위).
  // 0 이면 상대호가/ref 그대로. Bid 면 +N*tick, Ask 면 -N*tick.
  uint32 base_recovery_aggressive_ticks = 7;
  // counter 슬롯 공격적 정정 시 상대호가에서 얼마나 더 공격적으로 낼지 (tick 단위).
  // 0 이면 BEP 그대로. counter.side 가 Bid 면 +N*tick, Ask 면 -N*tick.
  uint32 counter_recovery_aggressive_ticks = 8;
}

// base 무발주 — counter(ETF) 상대호가±entry_aggressive_ticks pseudo-IOC 진입,
// 마지막 진입 체결가 기준 take_profit_ticks/stop_loss_ticks 틱 익절/손절(TP/SL),
// exit_delay_ms 경과 후 판정. 진입은 상대 1호가에서 entry_aggressive_ticks 만큼
// 공격적으로 제출 후 잔량 즉시 취소(pseudo-IOC). 청산은 체결될 때까지 호가 추적(amend).
message CounterIocTpSlExecution {
  // nav_kind / bid_basis / ask_basis 는 Pair.nav 로 이동 — reserved
  reserved 1, 2, 3;
  reserved "nav_kind", "bid_basis", "ask_basis";
  // 익절 임계 (틱)
  uint32 take_profit_ticks = 4;
  // 손절 임계 (틱)
  uint32 stop_loss_ticks = 5;
  // 청산 발주 시 상대 1호가 대비 추가 공격 틱 (0 = 상대호가 그대로)
  uint32 exit_aggressive_ticks = 6;
  // 진입 발주 시 상대 1호가에서 추가로 공격적으로 낼 틱 수 (0 = 상대호가 그대로).
  // 진입은 BEP 가 아니라 상대호가 ± n틱의 pseudo-IOC (접수 후 잔량 즉시 취소).
  uint32 entry_aggressive_ticks = 7;
  // 익절/손절 판정 대기 시간 (ms). 마지막 진입 체결 시각부터 이 시간 경과 후 판정 시작.
  uint64 exit_delay_ms = 8;
}

// base Limit + counter 잔류지정가(상대호가±틱, IOC 아님) + settle/recovery/balance
//
// BaseMakeCounterIocAndBalanceExecution 과 구조가 동일하되, counter 주문 가격이 NAV BEP IOC 가 아니라
// counter 오더북 상대호가 ± counter_aggressive_ticks 틱의 지정가(체결까지 호가창에 잔류, 취소 없음)이다.
// NAV 파라미터(Pair.nav)는 이 execution 에서 사용하지 않는다.
//
// PairEntry 필드 매핑:
//   - base.symbol / base.fund_code / base.side / base.quantity: 사용 (필수).
//   - counter.symbol / counter.fund_code / counter.side: 사용 (필수, 사용자가 직접 지정).
//   - counter.quantity: 무시 (런타임 = base.quantity × hedge_ratio). 0 으로 비워도 된다.
//   - PairEntry.price_source (양 슬롯): 무시. base 가격은 base.side 의 1호가(=BestMake),
//     counter 가격은 상대호가 ± counter_aggressive_ticks. 서버에서 UNSPECIFIED 로 정규화한다.
message BaseMakeCounterTakeAndBalanceExecution {
  // base 호가 잔량 회복 비율. 회복 시 base 잔량을 상대호가로 공격 정정(강제 체결).
  double recovery_ratio = 1;
  // settle_timeout_ms / reconcile_alert_amount 제거 (코드 상수로 대체) — reserved
  reserved 2, 3;
  reserved "settle_timeout_ms", "reconcile_alert_amount";
  // base 공격 정정 시 상대호가 대비 추가 틱. 0 이면 상대호가 그대로.
  // Bid 면 +N*tick, Ask 면 -N*tick.
  uint32 base_recovery_aggressive_ticks = 4;
  // 종단 counter cover 발주 시 추가 틱. 0 이면 상대호가 그대로.
  // counter.side 가 Bid 면 +N*tick, Ask 면 -N*tick.
  uint32 counter_recovery_aggressive_ticks = 5;
  // counter 진입 주문가 = counter 상대호가 ± 이 틱 수 (0 = 상대호가 그대로).
  // counter.side 가 Bid 면 +N*tick (더 공격적), Ask 면 -N*tick.
  uint32 counter_aggressive_ticks = 6;
}

// ============================================================================
// Request / Response Messages — CRUD
// ============================================================================

message GetPairRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];
}

message ListPairsRequest {
  // 페이지 크기 (optional)
  optional int32 page_size = 1;

  // 페이지 토큰 (optional, for pagination)
  optional string page_token = 2;

  // 필터링 조건 (optional, AIP-160)
  //
  // Available Fields:
  // * status - 상태 (ACTIVE / PAUSED / ARCHIVED)
  // * portfolio_id - Portfolio ID
  //
  // Examples:
  // * status=ACTIVE
  // * portfolio_id=1
  string filter = 3 [
    (google.api.field_behavior) = OPTIONAL
  ];
}

message ListPairsResponse {
  // Pair 목록
  repeated Pair pairs = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

message CreatePairRequest {
  // 생성할 Pair
  Pair pair = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message UpdatePairRequest {
  // 수정할 Pair
  Pair pair = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message DeletePairRequest {
  // 리소스 이름 (pairs/{id})
  string pair = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Pair"
    }
  ];
}


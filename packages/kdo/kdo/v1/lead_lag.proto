syntax = "proto3";

package kdo.v1.lead_lag;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/resource.proto";
import "google/api/client.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// LeadLagService - 선물-ETF 선행 차익거래 관리 서비스
service LeadLagService {
  // 단일 LeadLag 조회
  rpc GetLeadLag(GetLeadLagRequest) returns (LeadLag) {
    option (google.api.http) = {
      get: "/v1/{lead_lag=lead_lags/*}"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 목록 조회
  rpc ListLeadLags(ListLeadLagsRequest) returns (ListLeadLagsResponse) {
    option (google.api.http) = {
      get: "/v1/lead_lags"
    };
    option (google.api.method_signature) = "";
  }

  // LeadLag 생성
  rpc CreateLeadLag(CreateLeadLagRequest) returns (LeadLag) {
    option (google.api.http) = {
      post: "/v1/lead_lags"
      body: "lead_lag"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 수정
  rpc UpdateLeadLag(UpdateLeadLagRequest) returns (LeadLag) {
    option (google.api.http) = {
      patch: "/v1/{lead_lag.name=lead_lags/*}"
      body: "lead_lag"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 삭제
  rpc DeleteLeadLag(DeleteLeadLagRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{lead_lag=lead_lags/*}"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 활성화/비활성화
  rpc SetLeadLagActive(SetLeadLagActiveRequest) returns (LeadLag) {
    option (google.api.http) = {
      post: "/v1/{lead_lag=lead_lags/*}:setActive"
      body: "*"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 실시간 상태 스트리밍 (서버→클라이언트)
  rpc StreamLeadLagStatus(StreamLeadLagStatusRequest) returns (stream LeadLagStatusUpdate) {
    option (google.api.http) = {
      get: "/v1/{lead_lag=lead_lags/*}:streamStatus"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 전략 시작 (hot loop 시작)
  rpc StartLeadLag(StartLeadLagRequest) returns (StartLeadLagResponse) {
    option (google.api.http) = {
      post: "/v1/{lead_lag=lead_lags/*}:start"
      body: "*"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 전략 중지 (hot loop 중지)
  rpc StopLeadLag(StopLeadLagRequest) returns (StopLeadLagResponse) {
    option (google.api.http) = {
      post: "/v1/{lead_lag=lead_lags/*}:stop"
      body: "*"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // 체결 건별 가격 컨텍스트 조회 (시각화용 — market-archive 연동)
  // 특정 트리거 시점 전후의 선물/ETF 가격 흐름을 반환한다.
  rpc GetLeadLagTradeContext(GetLeadLagTradeContextRequest) returns (LeadLagTradeContext) {
    option (google.api.http) = {
      get: "/v1/{name=lead_lags/*/trades/*}:context"
    };
    option (google.api.method_signature) = "name";
  }

  // 체결 내역 목록 조회 (DB 저장된 과거 체결 기록, 페이징)
  rpc ListLeadLagTrades(ListLeadLagTradesRequest) returns (ListLeadLagTradesResponse) {
    option (google.api.http) = {
      get: "/v1/{lead_lag=lead_lags/*}/trades"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // 단일 체결 내역 조회
  rpc GetLeadLagTrade(GetLeadLagTradeRequest) returns (LeadLagTradeRecord) {
    option (google.api.http) = {
      get: "/v1/{lead_lag=lead_lags/*}/trades/{trade_id}"
    };
  }

  // LeadLag 체결 현황 요약 (선물/ETF 레그별 체결수량, 체결단가, 순매매)
  rpc GetLeadLagExecutionSummary(GetLeadLagExecutionSummaryRequest) returns (LeadLagExecutionSummaryResponse) {
    option (google.api.http) = {
      get: "/v1/{lead_lag=lead_lags/*}:executionSummary"
    };
    option (google.api.method_signature) = "lead_lag";
  }

}

// ============================================================================
// LeadLag Entity
// ============================================================================

// 선물-ETF 선행 차익거래 설정
message LeadLag {
  option (google.api.resource) = {
    type: "kdo.cdsapis.xyz/LeadLag"
    pattern: "lead_lags/{lead_lag}"
  };

  // 리소스 이름 (lead_lags/{id})
  string name = 1;

  // LeadLag ID
  int32 id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 전략 이름 (고유)
  string display_name = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 선물 ISIN 코드
  string futures_isin = 4 [
    (google.api.field_behavior) = REQUIRED
  ];

  // ETF ISIN 코드
  string etf_isin = 5 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 선물 펀드코드
  string futures_fund_code = 6 [
    (google.api.field_behavior) = REQUIRED
  ];

  // ETF 펀드코드
  string etf_fund_code = 7 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 트리거 설정
  LeadLagTriggerConfig trigger_config = 8;

  // 활성화 여부
  bool is_active = 9;

  // Reserved: previously futures_tick_size (10) and futures_multiplier (11)
  // Now looked up at runtime from FutureRepository
  reserved 10, 11;
  reserved "futures_tick_size", "futures_multiplier";

  // 생성 시간
  google.protobuf.Timestamp create_time = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 수정 시간
  google.protobuf.Timestamp update_time = 13 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 인버스 ETF 여부 (true: 선물과 같은 방향 헷지, false: 반대 방향 헷지)
  bool is_etf_inverse = 14;
}

// ============================================================================
// Trigger Configuration
// ============================================================================

// 선물 급변 감지 설정
message LeadLagTriggerConfig {
  // 트리거 틱 수 (선물 가격 변동 임계값, 틱 단위)
  int64 tick_threshold = 1;

  // 감지 윈도우 (마이크로초)
  uint64 window_us = 2;

  // 트리거 후 재트리거까지 대기시간 (밀리초)
  uint64 cooldown_ms = 3;

  // 최대 동시 포지션 (선물 계약 수)
  int64 max_position = 4;

  // 선물 1계약당 ETF 헷지 수량
  int64 etf_hedge_quantity = 5;

  // 선물 주문 수량 (계약 수)
  int64 futures_order_quantity = 6;
}

// ============================================================================
// Request/Response Messages
// ============================================================================

message GetLeadLagRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];
}

message ListLeadLagsRequest {
  // 페이지 크기 (optional)
  optional int32 page_size = 1;

  // 페이지 토큰 (optional, for pagination)
  optional string page_token = 2;

  // 필터링 조건 (optional, AIP-160)
  //
  // Available Fields:
  // * is_active - 활성화 여부
  //
  // Examples:
  // * is_active=true
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];
}

message ListLeadLagsResponse {
  // LeadLag 목록
  repeated LeadLag lead_lags = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

message CreateLeadLagRequest {
  // 생성할 LeadLag
  LeadLag lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message UpdateLeadLagRequest {
  // 수정할 LeadLag
  LeadLag lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message DeleteLeadLagRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];
}

message SetLeadLagActiveRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];

  // 활성화 여부
  bool is_active = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// LeadLag 전략 시작 요청
message StartLeadLagRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];
}

// LeadLag 전략 시작 응답
message StartLeadLagResponse {
  // 현재 실행 상태
  LeadLagState state = 1;
  // 응답 메시지
  string message = 2;
}

// LeadLag 전략 중지 요청
message StopLeadLagRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];
}

// LeadLag 전략 중지 응답
message StopLeadLagResponse {
  // 현재 실행 상태
  LeadLagState state = 1;
  // 응답 메시지
  string message = 2;
}

// ============================================================================
// Execution Summary (체결 현황 요약)
// ============================================================================

// 체결 현황 요약 요청
message GetLeadLagExecutionSummaryRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];
}

// 체결 현황 요약 응답
message LeadLagExecutionSummaryResponse {
  // 선물 레그 체결 현황
  LeadLagLegExecutionSummary futures = 1;

  // ETF 레그 체결 현황
  LeadLagLegExecutionSummary etf = 2;

  // 스프레드 (선물-ETF 체결단가 차이)
  optional double spread = 3;
}

// 개별 레그 체결 현황
message LeadLagLegExecutionSummary {
  // 매도 체결수량
  int64 sell_filled_qty = 1;

  // 매수 체결수량
  int64 buy_filled_qty = 2;

  // 매도 평균 체결단가
  optional double sell_avg_price = 3;

  // 매수 평균 체결단가
  optional double buy_avg_price = 4;

  // 순매매 (매수체결수량 - 매도체결수량)
  int64 net_qty = 5;
}

// ============================================================================
// Streaming Status Messages
// ============================================================================

// LeadLag 실시간 상태 스트리밍 요청
message StreamLeadLagStatusRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];
}

// LeadLag 실시간 상태 업데이트 (delta 방식: 변경된 필드만 전송)
message LeadLagStatusUpdate {
  // 전략 ID
  int32 lead_lag_id = 1;

  // 서비스 실행 상태 (변경 시에만 전송)
  optional LeadLagState state = 2;

  // 현재 선물 포지션 (양수=롱, 음수=숏)
  optional int64 futures_position = 3;

  // 총 트레이드 수
  optional uint64 total_trades = 4;

  // 마지막 선물 mid price
  optional double last_futures_price = 5;

  // 마지막 시그널 정보 (변경 시에만 전송)
  optional LeadLagSignalInfo last_signal = 6;

  // Price buffer 상태
  optional LeadLagPriceBufferInfo price_buffer = 7;

  // 주문 실행 지연시간 (마이크로초)
  optional uint64 latency_us = 8;

  // 타임스탬프 (마이크로초)
  uint64 timestamp_us = 9;
}

// LeadLag 서비스 실행 상태
enum LeadLagState {
  LEAD_LAG_STATE_UNSPECIFIED = 0;
  LEAD_LAG_STATE_IDLE = 1;
  LEAD_LAG_STATE_MONITORING = 2;
  LEAD_LAG_STATE_TRIGGERED = 3;
  LEAD_LAG_STATE_ERROR = 4;
}

// 시그널 상세 정보
message LeadLagSignalInfo {
  // 시그널 방향 (SPIKE/DROP)
  string direction = 1;

  // 틱 변동량
  int64 tick_change = 2;

  // 선물 주문 방향 (BID/ASK)
  string futures_side = 3;

  // ETF 주문 방향 (BID/ASK)
  string etf_side = 4;

  // 선물 주문 가격
  double futures_price = 5;

  // ETF 주문 가격
  double etf_price = 6;

  // 선물 주문 수량
  int64 futures_qty = 7;

  // ETF 주문 수량
  int64 etf_qty = 8;
}

// Price buffer 상태 정보
message LeadLagPriceBufferInfo {
  reserved 1;  // tick_count removed
  reserved 4;  // current_mid removed

  // 윈도우 내 ask 최저가 (매도 스파이크 감지용)
  optional double window_ask_low = 2;

  // 윈도우 내 bid 최고가 (매수 드롭 감지용)
  optional double window_bid_high = 3;
}

// ============================================================================
// Trade Context (체결 시각화용 가격 컨텍스트)
// ============================================================================

// 체결 시점 전후 가격 컨텍스트 조회 요청
message GetLeadLagTradeContextRequest {
  // Trade 리소스 이름. Format: "lead_lags/{lead_lag_id}/trades/{trade_id}"
  // trigger_time 및 window 는 서버에서 trade 레코드를 조회해 처리한다.
  string name = 1 [(google.api.field_behavior) = REQUIRED];

  // Reserved: previously lead_lag (field 1 → renamed), trade_timestamp_us (2),
  // window_before_ms (3), window_after_ms (4), trigger_time (5)
  reserved 2, 3, 4, 5;
  reserved "trade_timestamp_us", "window_before_ms", "window_after_ms", "trigger_time";
}

// 체결 시점 전후 가격 컨텍스트 응답
message LeadLagTradeContext {
  // 선물 가격 틱 (시간순)
  repeated LeadLagPriceTick futures_ticks = 1;

  // ETF 가격 틱 (시간순)
  repeated LeadLagPriceTick etf_ticks = 2;

  // 트리거 시점 (이전: trigger_timestamp_us uint64 — field 3 reserved)
  reserved 3;
  reserved "trigger_timestamp_us";

  // 해당 시그널 정보
  LeadLagSignalInfo signal = 4;

  // 트리거 시점 선물 가격
  double futures_price_at_trigger = 5;

  // 트리거 시점 ETF 가격
  double etf_price_at_trigger = 6;

  // 윈도우 내 선물 가격 변동률 (%)
  double futures_price_change_pct = 7;

  // 윈도우 내 ETF 가격 변동률 (%)
  double etf_price_change_pct = 8;

  // 트리거 시점 (UTC)
  google.protobuf.Timestamp trigger_time = 9;
}

// 가격 틱 데이터 (시각화용)
message LeadLagPriceTick {
  // 타임스탬프 (이전: timestamp_us uint64 — field 1 reserved)
  reserved 1;
  reserved "timestamp_us";

  // 가격 (체결가 또는 mid price)
  double price = 2;

  // 체결 수량 (호가 기반이면 0)
  int64 quantity = 3;

  // 매수/매도 구분 (BID/ASK, 호가 mid이면 빈 문자열)
  string side = 4;

  // 타임스탬프 (UTC)
  google.protobuf.Timestamp time = 5;
}

// ============================================================================
// Trade History (DB 영구 저장 체결 기록)
// ============================================================================

// 체결 기록 (DB에 영구 저장되는 트레이드 레코드)
message LeadLagTradeRecord {
  // DB ID
  int64 id = 1;

  // 부모 리소스 이름 (lead_lags/{id})
  string lead_lag = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];

  // 세션 내 순차 트레이드 번호
  int64 trade_number = 3;

  // 시그널 방향 (FUTURES_SPIKE / FUTURES_DROP)
  string direction = 4;

  // 틱 변동량
  int64 tick_change = 5;

  // 선물 주문 방향 (BID/ASK)
  string futures_side = 6;

  // ETF 주문 방향 (BID/ASK)
  string etf_side = 7;

  // 선물 주문 가격
  double futures_price = 8;

  // ETF 주문 가격
  double etf_price = 9;

  // 선물 주문 수량
  int64 futures_qty = 10;

  // ETF 주문 수량
  int64 etf_qty = 11;

  // 체결 후 선물 포지션
  int64 futures_position_after = 12;

  // 주문 실행 지연시간 (마이크로초)
  uint64 latency_us = 13;

  // Reserved: previously trigger_time_us (field 14) — renamed to send_order_time
  reserved 14;
  reserved "trigger_time_us";

  // 거래일 (YYYYMMDD)
  int32 date = 15;

  // 생성 시각
  google.protobuf.Timestamp created_at = 16 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 주문제출시간 (HHMMSSuuuuuu KST)
  int64 send_order_time = 17;

  // 트리거한 선물 시세의 거래소 시간 (HHMMSSuuuuuu KST)
  int64 trigger_exchange_time = 18;

  // 선물 체결시간 (HHMMSSuuuuuu KST)
  int64 futures_filled_time = 19;

  // ETF 체결시간 (HHMMSSuuuuuu KST)
  int64 etf_filled_time = 20;
}

// 체결 내역 목록 요청
message ListLeadLagTradesRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];

  // 페이지 크기 (기본: 50, 최대: 200)
  optional int32 page_size = 2;

  // 페이지 토큰 (다음 페이지 조회용)
  optional string page_token = 3;

  // 필터링 조건
  // Available Fields:
  // * date - 거래일 (YYYYMMDD), 예: date=20260228
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // 정렬 기준 (기본: trigger_time_us DESC)
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// 체결 내역 목록 응답
message ListLeadLagTradesResponse {
  // 체결 기록 목록
  repeated LeadLagTradeRecord trades = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;

  // 전체 건수
  int32 total_count = 3;
}

// 단일 체결 내역 조회 요청
message GetLeadLagTradeRequest {
  // 부모 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];

  // 체결 기록 ID
  int64 trade_id = 2 [(google.api.field_behavior) = REQUIRED];
}

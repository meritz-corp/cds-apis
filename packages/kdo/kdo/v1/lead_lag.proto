syntax = "proto3";

package kdo.v1.lead_lag;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/resource.proto";
import "google/api/client.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// LeadLagService - 선물-ETF 선행 차익거래 관리 서비스
service LeadLagService {
  // 단일 LeadLag 조회
  rpc GetLeadLag(GetLeadLagRequest) returns (LeadLag) {
    option (google.api.http) = {
      get: "/v1/{lead_lag=lead_lags/*}"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 목록 조회
  rpc ListLeadLags(ListLeadLagsRequest) returns (ListLeadLagsResponse) {
    option (google.api.http) = {
      get: "/v1/lead_lags"
    };
    option (google.api.method_signature) = "";
  }

  // LeadLag 생성
  rpc CreateLeadLag(CreateLeadLagRequest) returns (LeadLag) {
    option (google.api.http) = {
      post: "/v1/lead_lags"
      body: "lead_lag"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 수정
  rpc UpdateLeadLag(UpdateLeadLagRequest) returns (LeadLag) {
    option (google.api.http) = {
      patch: "/v1/{lead_lag.name=lead_lags/*}"
      body: "lead_lag"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 삭제
  rpc DeleteLeadLag(DeleteLeadLagRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{lead_lag=lead_lags/*}"
    };
    option (google.api.method_signature) = "lead_lag";
  }

  // LeadLag 활성화/비활성화
  rpc SetLeadLagActive(SetLeadLagActiveRequest) returns (LeadLag) {
    option (google.api.http) = {
      post: "/v1/{lead_lag=lead_lags/*}:setActive"
      body: "*"
    };
    option (google.api.method_signature) = "lead_lag";
  }
}

// ============================================================================
// LeadLag Entity
// ============================================================================

// 선물-ETF 선행 차익거래 설정
message LeadLag {
  option (google.api.resource) = {
    type: "kdo.cdsapis.xyz/LeadLag"
    pattern: "lead_lags/{lead_lag}"
  };

  // 리소스 이름 (lead_lags/{id})
  string name = 1;

  // LeadLag ID
  int32 id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 전략 이름 (고유)
  string display_name = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 선물 ISIN 코드
  string futures_isin = 4 [
    (google.api.field_behavior) = REQUIRED
  ];

  // ETF ISIN 코드
  string etf_isin = 5 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 선물 펀드코드
  string futures_fund_code = 6 [
    (google.api.field_behavior) = REQUIRED
  ];

  // ETF 펀드코드
  string etf_fund_code = 7 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 트리거 설정
  LeadLagTriggerConfig trigger_config = 8;

  // 활성화 여부
  bool is_active = 9;

  // 선물 틱 사이즈 (예: 0.05)
  double futures_tick_size = 10;

  // 선물 승수 (예: 250000)
  double futures_multiplier = 11;

  // 생성 시간
  google.protobuf.Timestamp create_time = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 수정 시간
  google.protobuf.Timestamp update_time = 13 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// ============================================================================
// Trigger Configuration
// ============================================================================

// 선물 급변 감지 설정
message LeadLagTriggerConfig {
  // 트리거 틱 수 (선물 가격 변동 임계값, 틱 단위)
  int64 tick_threshold = 1;

  // 감지 윈도우 (밀리초)
  uint64 window_ms = 2;

  // 트리거 후 재트리거까지 대기시간 (밀리초)
  uint64 cooldown_ms = 3;

  // 최대 동시 포지션 (선물 계약 수)
  int64 max_position = 4;

  // 선물 1계약당 ETF 헷지 수량
  int64 etf_hedge_quantity = 5;

  // 선물 주문 수량 (계약 수)
  int64 futures_order_quantity = 6;
}

// ============================================================================
// Request/Response Messages
// ============================================================================

message GetLeadLagRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];
}

message ListLeadLagsRequest {
  // 페이지 크기 (optional)
  optional int32 page_size = 1;

  // 페이지 토큰 (optional, for pagination)
  optional string page_token = 2;

  // 필터링 조건 (optional, AIP-160)
  //
  // Available Fields:
  // * is_active - 활성화 여부
  //
  // Examples:
  // * is_active=true
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];
}

message ListLeadLagsResponse {
  // LeadLag 목록
  repeated LeadLag lead_lags = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

message CreateLeadLagRequest {
  // 생성할 LeadLag
  LeadLag lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message UpdateLeadLagRequest {
  // 수정할 LeadLag
  LeadLag lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message DeleteLeadLagRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];
}

message SetLeadLagActiveRequest {
  // 리소스 이름 (lead_lags/{id})
  string lead_lag = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLag"
    }
  ];

  // 활성화 여부
  bool is_active = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

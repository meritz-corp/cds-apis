syntax = "proto3";

package kdo.v1.lp;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/resource.proto";
import "google/api/client.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// LP 서비스는 ETF LP 관련 서비스를 제공합니다.
service LpService {
  // ETF LP 생성
//  rpc CreateMm(CreateMmRequest) returns (Mm) {
//    option (google.api.http) = {
//      post: "/v1/lps"
//      body: "mm"
//    };
//    option (google.api.method_signature) = "mm";
//  }

  // ETF LP 조회
  rpc GetMm(GetMmRequest) returns (Mm) {
    option (google.api.http) = {
      get: "/v1/lps/{etf=etfs/*}/{fund=funds/*}"
    };
    option (google.api.method_signature) = "";
  }

  // ETF LP 목록 조회
  rpc ListMms(ListMmsRequest) returns (ListMmsResponse) {
    option (google.api.http) = {
      get: "/v1/lps"
    };
    option (google.api.method_signature) = "";
  }

  // ETF LP 업데이트
  rpc UpdateMm(UpdateMmRequest) returns (Mm) {
    option (google.api.http) = {
      patch: "/v1/lps/etfs/{symbol=*}/funds/{fund_code=*}"
      body: "*"
    };
    option (google.api.method_signature) = "symbol,fund_code";
  }

  // ETF LP 상태 조회
  rpc GetMmStatus(GetMmStatusRequest) returns (MmStatus) {
    option (google.api.http) = {
      get: "/v1/lps/{etf=etfs/*}/{fund=funds/*}/status"
    };
    option (google.api.method_signature) = "etf,fund";
  }

  // ETF LP 상태 목록 조회
  rpc ListMmStatuses(ListMmStatusesRequest) returns (ListMmStatusesResponse) {
    option (google.api.http) = {
      get: "/v1/lps/etfs/*/funds/*/status"
    };
    option (google.api.method_signature) = "";
  }


  // ETF LP 상태 스트리밍 (실시간 업데이트)
  rpc StreamMmStatusUpdate(StreamMmStatusUpdateRequest) returns (stream MmStatusUpdate) {
    option (google.api.http) = {
      get: "/v1/lps/{etf=etfs/*}/{fund=funds/*}/status_update:stream"
    };
    option (google.api.method_signature) = "etf,fund,update_interval_seconds";
  }

  // ETF LP 시작
  rpc StartMm(StartMmRequest) returns (StartMmResponse) {
    option (google.api.http) = {
      post: "/v1/lps/{etf=etfs/*}/{fund=funds/*}:start"
      body: "*"
    };
  }

  // ETF LP 중지
  rpc StopMm(StopMmRequest) returns (StopMmResponse) {
    option (google.api.http) = {
      post: "/v1/lps/{etf=etfs/*}/{fund=funds/*}:stop"
      body: "*"
    };
  }

  // 사용자 주문장 업데이트를 가져오기
  rpc GetUserOrderbook(GetUserOrderBookRequest) returns (UserOrderbookData) {
    option (google.api.http) = {
      get: "/v1/lps/{etf=etfs/*}/{fund=funds/*}/orderbook"
    };
  }

  // 사용자 주문장 업데이트를 스트리밍
  rpc StreamUserOrderbook(GetUserOrderBookRequest) returns (stream UserOrderbookData) {
    option (google.api.http) = {
      get: "/v1/lps/{etf=etfs/*}/{fund=funds/*}/orderbook:stream"
    };
  }
}

// ETF LP 설정
message Mm {
  // ETF 심볼
  string symbol = 1;

  // Fund
  string fund_code = 2;


  double ask_basis = 3;

  //
  double bid_basis = 4;

  reserved 7; // was: quantity (split into bid_quantity/ask_quantity)

  // 호가 깊이 (양방향 레벨 수)
  uint32 depth = 8;

  // ETF tick 크기 (원 단위, i64)
  int64 tick_size = 9;

  // 동적 offset 조정 설정
  MmOffset offset = 10;

  // 활성화 여부
  bool enabled = 11;

  // ETF 가격 산출 방식
  EtfPricing pricing_method = 12;

  // 매수 호가 조정값
  optional double bid_adjustment = 13;

  // 매도 호가 조정값
  optional double ask_adjustment = 14;

  // 매수 주문 수량 (i64)
  int64 bid_quantity = 15;

  // 매도 주문 수량 (i64)
  int64 ask_quantity = 16;

  // 모멘텀 활성화 여부
  optional bool momentum_enabled = 17;

  // 모멘텀 윈도우 크기
  optional uint32 momentum_window = 18;

  // 모멘텀 민감도
  optional double momentum_sensitivity = 19;

  // 매수/매도 수량 한도
  optional MmQuantityLimit quantity_limit = 20;
}

// 매수/매도 수량 한도
message MmQuantityLimit {
  reserved 1, 3;
  reserved "min_bid_quantity", "min_ask_quantity";

  // 매수 수량 상한 (gross 누적 매수 체결 기준)
  int64 max_bid_quantity = 2;
  // 매도 수량 상한 (gross 누적 매도 체결 기준)
  int64 max_ask_quantity = 4;

  // 순포지션 (+ = 순매수, - = 순매도): gross_bid - gross_ask
  // 상태 조회 시 런타임 계산값으로 노출; 한도 검증에는 max_net_quantity 참조
  optional int64 net_quantity = 5;

  // 순포지션 한도 설정값 (한도 검증에 사용)
  // net_quantity > 0 && net_quantity >= max_net_quantity → 매수 차단
  // net_quantity < 0 && |net_quantity| >= max_net_quantity → 매도 차단
  // 미설정(None) 시 순포지션 기반 차단 비활성
  optional int64 max_net_quantity = 6;
}

// ETF 가격 산출 방식
message EtfPricing {
  oneof method {
    // 분해 헷지 방식
    PdfNavHedgePricing pdf_nav_hedge = 1;

    // 선물 헷지 방식
    IndexTrackingHedgePricing index_tracking_hedge = 2;

    FutureBasis future_basis = 3;

    // 레버리지 선물 방식
    LeverageFuturePricing leverage_future = 4;
  }
}

// 분해 헷지 가격 산출 (추가 파라미터 없음)
message PdfNavHedgePricing {}

// 선물 헷지 가격 산출
message IndexTrackingHedgePricing {}

message FutureBasis {
  string prev_index = 1;
}

// 레버리지 선물 가격 산출
message LeverageFuturePricing {
  // 기초지수 전일종가
  double prev_index = 1;

  // 선물 전일종가
  double prev_future = 2;
}

// ========== MM Status Messages ==========

// ETF LP 상태
message MmStatus {
  // ETF 심볼
  string etf_symbol = 1;

  // 펀드 코드
  string fund_code = 2;

  // Basis 스프레드 (원 단위, i64)
  optional double ask_basis = 3;

  optional double bid_basis = 4;

  reserved 7; // was: quantity (split into bid_quantity/ask_quantity)

  // LP 상태
  MmState state = 8;

  // 가격 정보
  LpPricing pricing = 9;

  // 체결 통계
  FillStatistics fill_statistics = 10;

  // 동적 offset 조정 설정 (optional)
  MmOffset offset = 11;

  // 헷지 정보
  MmHedge hedge = 12;

  // 매수 호가 조정값
  optional double bid_adjustment = 13;

  // 매도 호가 조정값
  optional double ask_adjustment = 14;

  // 매수 주문 수량 (i64)
  int64 bid_quantity = 15;

  // 매도 주문 수량 (i64)
  int64 ask_quantity = 16;

  // 모멘텀 활성화 여부
  optional bool momentum_enabled = 17;

  // 모멘텀 윈도우 크기
  optional uint32 momentum_window = 18;

  // 모멘텀 민감도
  optional double momentum_sensitivity = 19;

  // 런타임 계산된 모멘텀 매수 호가 조정값
  optional double momentum_bid_adjustment = 20;

  // 런타임 계산된 모멘텀 매도 호가 조정값
  optional double momentum_ask_adjustment = 21;

  // 매수/매도 수량 한도
  optional MmQuantityLimit quantity_limit = 22;
}

// ETF LP 상태 업데이트 메시지 (변화된 필드만 포함)
message MmStatusUpdate {
  // ETF 심볼
  string etf_symbol = 1;

  // 펀드 코드
  string fund_code = 2;

  // Basis 스프레드
  optional double ask_basis = 3;

  optional double bid_basis = 4;

  reserved 7; // was: quantity (split into bid_quantity/ask_quantity)

  // LP 상태
  optional MmState state = 8;

  // 가격 정보
  optional LpPricing pricing = 9;

  // 체결 통계
  optional FillStatistics fill_statistics = 10;

  // 동적 offset 조정 설정 (optional)
  optional MmOffset offset = 11;

  // 매수 호가 조정값
  optional double bid_adjustment = 12;

  // 매도 호가 조정값
  optional double ask_adjustment = 13;

  // 매수 주문 수량 (i64)
  optional int64 bid_quantity = 14;

  // 매도 주문 수량 (i64)
  optional int64 ask_quantity = 15;

  // 모멘텀 활성화 여부
  optional bool momentum_enabled = 16;

  // 모멘텀 윈도우 크기
  optional uint32 momentum_window = 17;

  // 모멘텀 민감도
  optional double momentum_sensitivity = 18;

  // 런타임 계산된 모멘텀 매수 호가 조정값
  optional double momentum_bid_adjustment = 19;

  // 런타임 계산된 모멘텀 매도 호가 조정값
  optional double momentum_ask_adjustment = 20;

  // 매수/매도 수량 한도
  optional MmQuantityLimit quantity_limit = 21;
}


// 순매매량 기반 조정 전략
enum PositionAdjustmentStrategy {
  POSITION_ADJUSTMENT_STRATEGY_UNSPECIFIED = 0;
  // 회피: 순매수 과다 시 매수offset 증가 (덜 공격적으로 매수)
  POSITION_ADJUSTMENT_STRATEGY_AVOIDANCE = 1;
  // 매매회전: 순매수 과다 시 매도offset 감소 (더 공격적으로 매도)
  POSITION_ADJUSTMENT_STRATEGY_TURNOVER = 2;
  // 모두 적용: 순매수 과다 시 매수offset 증가 및 매도offset 감소
  POSITION_ADJUSTMENT_STRATEGY_ALL = 10;
}

// 자동 offset 조정 설정
message MmOffset {
  //
  double bid_offset = 1;
  double ask_offset = 2;

  // NAV 밴드 설정
  double min_offset = 3;
  double max_offset = 4;

  // 시간 기반 조정
  bool time_adjustment_enabled = 7;
  uint64 adjustment_interval_secs = 8;
  double adjustment_step = 9;
  bool reset_on_fill = 10;

  // 순매매량 기반 조정
  bool position_adjustment_enabled = 17;
  PositionAdjustmentStrategy position_strategy = 18;
  int64 position_threshold = 19;
  double position_adjustment_step = 20;
}

// ETF LP 헷지 설정
message MmHedge {
  // 헷지 대상 종목 심볼
  string symbol = 1;

  // 펀드 리소스 이름
  // format: funds/{fund_code}
  string fund = 2 [
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  // 헷지 1주 주문당 ETF 체결수량 기준
  int64 filled_quantity_per_hedge = 3;
}


// ETF 체결 통계 (매수/매도 체결량 및 평균 단가)
message FillStatistics {
  // 매수 체결량
  int64 buy_filled_quantity = 1;

  // 매도 체결량
  int64 sell_filled_quantity = 2;

  // 매수 총금액 (평균 단가 계산용)
  string buy_total_amount = 3;

  // 매도 총금액 (평균 단가 계산용)
  string sell_total_amount = 4;
}

// ETF LP 상태 enum
enum MmState {
  MM_STATE_UNSPECIFIED = 0;
  MM_STATE_IDLE = 1;
  MM_STATE_RUNNING = 2;
  MM_STATE_STOPPING = 3;
  MM_STATE_ERROR = 4;
}

// 주문 통계
message OrderStats {
  // 총 전송 주문 수
  uint64 total_orders_sent = 1;

  // 접수된 주문 수
  uint64 orders_accepted = 2;

  // 거부된 주문 수
  uint64 orders_rejected = 3;

  // 체결된 주문 수
  uint64 orders_filled = 4;

  // 총 체결 수량
  int64 total_filled_quantity = 5;

  // 일일 체결 수량
  int64 daily_filled_quantity = 6;
}

// 시간 프레임별 상태
message TimeFrameStatus {
  // 시간 윈도우 (초)
  uint64 window_seconds = 1;

  // 현재 윈도우 내 주문 개수
  uint32 current_count = 2;

  // 최대 주문 개수
  uint32 max_orders = 3;

  // 사용률 (%)
  double usage_percent = 4;
}

// LP 가격 정보
message LpPricing {
  string etf_ask_quote = 1;

  string etf_bid_quote = 2;

  // ETF NAV (원 단위)
  string etf_ask_nav = 3;

  string etf_bid_nav = 4;
}

// ========== Request/Response Messages ==========

// CreateMm
message CreateMmRequest {
  // 생성할 ETF LP 설정
  Mm mm = 1 [(google.api.field_behavior) = REQUIRED];
}

// GetMm
message GetMmRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// ListMms
message ListMmsRequest {
  // 페이지 크기 (optional)
  optional uint32 page_size = 1;

  // 페이지 토큰 (optional, for pagination)
  optional string page_token = 2;

  // Available Sequence and Operator
  // * etf_symbol
  //   * `equal`, `contains`
  // * fund_code
  //   * `equal`, `contains`
  //
  // Examples
  // * filter=etf_symbol:"005930"
  // * filter=fund_code="0159"
  string filter = 3;
}

message ListMmsResponse {
  // ETF 목록
  repeated Mm mms = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

message ListMmStatusesRequest {
  // 페이지 크기 (optional)
  optional uint32 page_size = 1;

  // 페이지 토큰 (optional, for pagination)
  optional string page_token = 2;

  // Available Sequence and Operator
  // * etf_symbol
  //   * `equal`, `contains`
  // * fund_code
  //   * `equal`, `contains`
  // * state
  //   * `equal`
  // * fill_satistics.buy_filled_quantity
  //   * `greater_than`, `less_than`
  //
  // Examples
  // * filter=etf_symbol:"005930"
  // * filter=fund_code="0159"
  // * filter=state=MM_STATE_RUNNING
  // * filter=fill_statistics.buy_filled_quantity > 1000

  string filter = 3 [(google.api.field_behavior) = OPTIONAL];

  // 오더링 조건. (optional, AIP-132)
  //
  // Supported Fields
  // * "fill_statistics.buy_filled_quantity", "fill_statistics.sell_filled_quantity"
  //
  // Examples
  // * order_by=fill_statistics.buy_filled_quantity desc
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

message ListMmStatusesResponse {
  // ETF 목록
  repeated MmStatus mm_statuses = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}


// UpdateMm
message UpdateMmRequest {
  // ETF 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // 펀드 코드
  string fund_code = 2 [(google.api.field_behavior) = REQUIRED];

  // 각 필드가 optional — 여러 필드를 동시에 설정 가능
  // (tag 3은 예약, oneof wrapper와 충돌 방지)

  // 호가 깊이
  optional uint32 depth = 4;

  // 동적 offset 조정 설정
  optional MmOffset offset = 5;

  optional double ask_basis = 6;

  optional double bid_basis = 7;

  // 매수 주문 수량
  optional int64 bid_quantity = 8;

  // 매도 주문 수량
  optional int64 ask_quantity = 9;

  // 매수 호가 조정값
  optional double bid_adjustment = 10;

  // 매도 호가 조정값
  optional double ask_adjustment = 11;

  // 모멘텀 활성화 여부
  optional bool momentum_enabled = 12;

  // 모멘텀 윈도우 크기
  optional uint32 momentum_window = 13;

  // 모멘텀 민감도
  optional double momentum_sensitivity = 14;

  // 매수/매도 수량 한도
  optional MmQuantityLimit quantity_limit = 15;
}


// GetMmStatus
message GetMmStatusRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}
// StreamMmStatusUpdate
message StreamMmStatusUpdateRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// ETF LP 시작 요청
message StartMmRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// ETF LP 시작 응답
message StartMmResponse {
  // LP 상태
  MmStatus status = 1;

  // 메시지
  string message = 2;
}

// ETF LP 중지 요청
message StopMmRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// ETF LP 중지 응답
message StopMmResponse {
  // LP 상태
  MmStatus status = 1;

  // 메시지
  string message = 2;
}

// StreamLpEvents 요청
message StreamLpEventsRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// 주문 업데이트 스트리밍 요청
message GetUserOrderBookRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// 주문 업데이트 정보
message UserOrderbookData {
  // 매수 호가 (10단계, AIP-144)
  repeated string bid_prices = 1;

  // 매도 호가 (10단계)
  repeated string ask_prices = 2;

  // 매수 수량 (10단계)
  repeated int64 bid_quantities = 3;

  // 매도 수량 (10단계)
  repeated int64 ask_quantities = 4;
}

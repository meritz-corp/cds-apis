syntax = "proto3";

package kdo.v1.order_log;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/api/client.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/empty.proto";
import "kdo/v1/common.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// OrderLogService는 펀드 관련 서비스를 제공합니다.
service OrderLogService {
  // 주문 로그 조회
  rpc ListOrderLogs(ListOrderLogsRequest) returns (ListOrderLogsResponse) {
    option (google.api.http) = {
      get: "/v1/order_logs"
    };
    option (google.api.method_signature) = "";
  }

  // 주문 로그 스트리밍
  rpc StreamOrderLogs(ListOrderLogsRequest) returns (stream OrderLog) {
    option (google.api.http) = {
      get: "/v1/order_logs:stream"
    };
    option (google.api.method_signature) = "";
  }

  // 주문 로그 조회
  rpc GetOrderLogStatistics(GetOrderLogStatisticsRequest) returns (OrderLogFillStatistics) {
    option (google.api.http) = {
      get: "/v1/order_logs/statistics"
    };
    option (google.api.method_signature) = "";
  }

  // 주문 로그 통계 스트리밍
  rpc StreamOrderLogStatistics(GetOrderLogStatisticsRequest) returns (stream OrderLogFillStatistics) {
    option (google.api.http) = {
      get: "/v1/order_logs/statistics:stream"
    };
    option (google.api.method_signature) = "";
  }

  // 주문 체인 조회: 원본 주문 + 체결 + 파생 헷지 주문 전체 로그
  rpc GetOrderChain(GetOrderChainRequest) returns (GetOrderChainResponse) {
    option (google.api.http) = {
      get: "/v1/order_logs/{order_id}:chain"
    };
    option (google.api.method_signature) = "order_id";
  }

  // 헷지 체결 주문의 원주문 상세 정보 조회
  rpc GetHedgePairDetail(GetHedgePairDetailRequest) returns (HedgePairDetail) {
    option (google.api.http) = {
      get: "/v1/order_logs/{order_id}:hedgePairDetail"
    };
    option (google.api.method_signature) = "order_id";
  }

  // 헷지 쌍 상세 정보 실시간 스트림
  rpc StreamHedgePairDetail(StreamHedgePairDetailRequest) returns (stream HedgePairDetail) {
    option (google.api.http) = {
      get: "/v1/order_logs:streamHedgePairDetail"
    };
    option (google.api.method_signature) = "symbol";
  }

  // 헷지 쌍 상세 정보 페이지네이션 조회 (historical)
  rpc ListHedgePairDetails(ListHedgePairDetailsRequest) returns (ListHedgePairDetailsResponse) {
    option (google.api.http) = {
      get: "/v1/order_logs:listHedgePairDetails"
    };
    option (google.api.method_signature) = "symbol";
  }

  // 원주문/헷지 두 다리의 당일 체결 집계를 페어로 실시간 스트리밍
  rpc StreamPairFillSummary(StreamPairFillSummaryRequest) returns (stream PairFillSummary) {
    option (google.api.http) = {
      get: "/v1/order_logs:streamPairFillSummary"
    };
    option (google.api.method_signature) = "quote_fund_code,quote_symbol,hedge_fund_code,hedge_symbol";
  }
}


// 주문 로그
message OrderLog {
  // 로그 고유 ID (DB에서 자동 생성)
  int64 id = 1;

  // 주문 ID (거래소에서 받은 ID)
  uint64 order_id = 2;

  // 원본 주문 ID (수정/취소의 경우)
  // Option<u64>는 optional uint64로 매핑
  optional uint64 original_order_id = 3;

  // 펀드 코드
  string fund_code = 4;

  // 심볼
  string symbol = 5;

  // 로그 타입
  OrderLogType log_type = 6;

  // 주문 방향 (매수/매도)
  kdo.v1.common.OrderSide side = 7;

  // 주문 타입 (신규/정정/취소)
  OrderType order_type = 8;

  // 주문 가격 (Price)
  // 정확도 유지를 위해 string 또는 고정 소수점(fixed64 등)을 사용할 수 있으나,
  // 여기서는 간단하게 string으로 가정
  string price = 9;

  // 주문 수량 (Quantity)
  // 정확도 유지를 위해 string 또는 고정 소수점(fixed64 등)을 사용할 수 있으나,
  // 여기서는 간단하게 string으로 가정
  string quantity = 10;

  // 체결 가격 (Filled 로그의 경우) (FilledPrice)
  optional string filled_price = 11;

  // 체결 수량 (Filled 로그의 경우) (FilledQuantity)
  optional string filled_quantity = 12;

  // 체결 금액 (계산값) (FilledAmount)
  optional string filled_amount = 13;

  // 거부/취소 코드
  optional string rejection_code = 14;

  // 에러 메시지 (MeritzRejected의 경우)
  optional string error_message = 15;

  // 거래소 시각 (KST, HHMMSSuuuuuu)
  uint64 exchange_time = 16;

  // 이벤트 수신 시각 (시스템 시각, 마이크로초)
  // Rust Timestamp 타입을 u64로 가정
  uint64 receive_time = 17;

  // DB 삽입 시각
  // Rust의 DateTime<Utc> 타입을 Google의 Timestamp 메시지로 매핑
  google.protobuf.Timestamp created_at = 18;

  // 시장 구분
  kdo.v1.common.MarketType market_type = 19;

  // 거래일 (YYYYMMDD)
  uint32 date = 20;

  // 사용자 영역 (JSON: QuoteContext 또는 HedgeContext)
  optional string user_area = 21;

  reserved 22;
}

// 주문 로그 타입
enum OrderLogType {
  // Rust의 SCREAMING_SNAKE_CASE를 반영하여 정의
  // 주석은 Rust 코드의 내용을 번역했습니다.

  // 알 수 없는 값 (기본값)
  ORDER_LOG_TYPE_UNSPECIFIED = 0;

  // 접수 확인
  RECEIVED = 1;

  // 거래소 거부
  REJECTED = 2;

  // 메리츠 내부 거부
  MERITZ_REJECTED = 3;

  // 체결
  FILLED = 4;

  // 자동 취소
  AUTO_CANCELLED = 5;
}

// 주문 타입 (신규/정정/취소)
// Rust 코드에는 정의되지 않았지만, OrderLog에 사용되므로 정의 가정
enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  NEW = 1; // 신규
  AMEND = 2; // 정정
  CANCEL = 3; // 취소
}


message OrderLogFillStatistics {
  // 총 체결 건수
  int64 total_fills = 1;

  // 총 체결 수량
  int64 total_quantity = 2;

  // 총 체결 금액
  int64 total_amount = 3;

  // 매수 체결 건수
  int64 buy_count = 4;

  // 매도 체결 건수
  int64 sell_count = 5;
}

// ========== Request/Response Messages ==========

// ListOrderLogs 요청
message ListOrderLogsRequest {
  // 페이지 크기 (optional)
  optional uint32 page_size = 1;

  // 페이지 토큰 (optional, for pagination)
  optional string page_token = 2;

  // Available Sequence and Operator
  // * fund_code
  //   * `equal`, `contains`
  // * symbol
  //   * `equal`, `contains
  // * log_type
  //   * `equal`
  // * side
  //   * `equal`
  // * order_type
  //   * `equal`
  //
  // Examples
  // * filter=fund_code="0159"
  // * filter=symbol:"7526"
  // * filter=log_type=FILLED
  // * filter=side=BUY
  // * filter=order_type=AMEND
  // * filter=market_type=KOSPI
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];

  // 오더링 조건. (optional, AIP-132)
  //
  // Supported Fields
  // * "order_id", "exchange_time", "receive_time", "date"
  //
  // Examples
  // * order_by=order_id desc
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];
}

// ListOrderLogs 응답
message ListOrderLogsResponse {
  // 펀드 목록
  repeated OrderLog order_logs = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

message GetOrderLogStatisticsRequest {
  // AIP 스타일 문자열 필터. GetOrderLogStatistics 및 StreamOrderLogStatistics 공용.
  //
  // Available Fields and Operators
  // * fund_code
  //   * `equal`, `contains`
  // * symbol
  //   * `equal`, `contains`
  // * exchange_time
  //   * 날짜/시각 범위 필터. ISO 8601 (RFC3339) 값, 연산자 `>`, `>=`, `<`, `<=` 지원.
  //   * 미지정 시 전체 기간 누적 집계.
  //
  // Examples
  // * filter=fund_code="0159"
  // * filter=symbol:"7526"
  // * filter=exchange_time>="2026-06-02T00:00:00Z" AND exchange_time<"2026-06-03T00:00:00Z"
  // * filter=fund_code="0159" AND exchange_time>="2026-06-02T00:00:00Z" AND exchange_time<"2026-06-03T00:00:00Z"
  string filter = 1;
}

message GetOrderChainRequest {
  uint64 order_id = 1 [(google.api.field_behavior) = REQUIRED];
  // YYYYMMDD, 미지정 시 오늘 날짜
  optional uint32 date = 2;
}

message GetOrderChainResponse {
  repeated OrderLog order_logs = 1;
}

// GetHedgePairDetail 요청
message GetHedgePairDetailRequest {
  // 주문 ID (hedge 또는 quote order)
  uint64 order_id = 1 [(google.api.field_behavior) = REQUIRED];
  // 날짜 (YYYYMMDD, optional - 미지정 시 당일)
  optional uint32 date = 2;
}

// StreamHedgePairDetail 요청
message StreamHedgePairDetailRequest {
  // 감시할 ETF 심볼
  string symbol = 1;

  // 펀드 필터
  optional string fund_code = 2;

  // 선물 LP 헷지 ETF 필터
  optional string hedge_symbol = 3;

  // Quote 방향 필터 (optional - 미지정 시 양방향 모두)
  optional kdo.v1.common.OrderSide quote_side = 4;

  // 재연결 시 끊긴 시점 이후만 받고 싶을 때 (마이크로초)
  optional uint64 since_hedge_exchange_time_us = 5;
}

// 헷지 쌍 상세 정보
message HedgePairDetail {
  // Quote(원주문) 주문 ID
  uint64 quote_order_id = 1;
  // ETF 심볼
  string quote_symbol = 2;
  // ETF 방향 (매수/매도)
  kdo.v1.common.OrderSide quote_side = 3;
  // ETF 체결 수량
  int64 quote_filled_quantity = 4;
  // ETF 평균 체결 가격
  double quote_avg_price = 5;
  // Hedge 심볼 (선물)
  string hedge_symbol = 6;
  // Hedge 체결 수량
  int64 hedge_filled_quantity = 7;
  // Hedge 평균 체결 가격
  double hedge_avg_price = 8;
  // 스프레드 (선물가격 * 100 - ETF가격)
  double spread = 9;
  // 펀드 코드
  string fund_code = 10;
  // 날짜 (YYYYMMDD)
  uint32 date = 11;
  // 마지막 Hedge 거래소 시각 (마이크로초)
  uint64 hedge_exchange_time = 12;
}

// 한쪽 방향(매수 또는 매도)의 체결 집계
message SideFillSummary {
  uint64 fill_count = 1;          // 체결 건수
  int64  filled_quantity = 2;     // 누적 체결 수량
  double avg_price = 3;           // 평균 체결 가격 (금액/수량)
  double amount = 4;              // 체결 금액 합 (filled_price*filled_quantity 합)
  uint64 last_exchange_time = 5;  // 마지막 체결 거래소 시각 (마이크로초)
}

// 한 다리(원주문 또는 헷지)의 fund+symbol 단위 집계
message LegFillSummary {
  string fund_code = 1;
  string symbol = 2;
  SideFillSummary bid = 3;        // 매수 집계
  SideFillSummary ask = 4;        // 매도 집계
}

// 원주문/헷지 두 다리를 페어로 묶은 스냅샷 (stream 의 각 틱마다 emit)
message PairFillSummary {
  LegFillSummary quote = 1;       // 원주문 다리 (ETF)
  LegFillSummary hedge = 2;       // 헷지 다리 (선물)
  uint32 date = 3;                // YYYYMMDD
}

// StreamPairFillSummary 요청
message StreamPairFillSummaryRequest {
  string quote_fund_code = 1;     // 원주문 펀드 코드
  string quote_symbol = 2;        // 원주문 심볼 (ETF)
  string hedge_fund_code = 3;     // 헷지 펀드 코드
  string hedge_symbol = 4;        // 헷지 심볼 (선물)
  optional uint32 date = 5;       // 날짜(YYYYMMDD). 미지정 시 서버가 당일로 처리
}

// ListHedgePairDetails 요청
message ListHedgePairDetailsRequest {
  // 감시할 ETF/quote 심볼 (필수)
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // 펀드 필터
  optional string fund_code = 2;

  // 선물 LP의 헷지 ETF 필터 (hedge_symbol 매칭)
  optional string hedge_symbol = 3;

  // Quote 방향 필터
  optional kdo.v1.common.OrderSide quote_side = 4;

  // 날짜 필터 (YYYYMMDD). 당일만 조회할 때 사용
  optional uint32 date = 5;

  // 이 시각 이후의 결과만 (resume용, 마이크로초)
  optional uint64 since_hedge_exchange_time_us = 6;

  // 페이지 크기 (기본 200, 최대 1000)
  int32 page_size = 7;

  // 페이지 토큰
  string page_token = 8;
}

// ListHedgePairDetails 응답
message ListHedgePairDetailsResponse {
  repeated HedgePairDetail details = 1;
  string next_page_token = 2;
}

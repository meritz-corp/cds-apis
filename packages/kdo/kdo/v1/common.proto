syntax = "proto3";

package kdo.v1.common;

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// 주문 방향
enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BID = 1;  // 매수
  ORDER_SIDE_ASK = 2;  // 매도
}

// 시장 유형
enum MarketType {
  MARKET_TYPE_UNSPECIFIED = 0;
  // KOSPI
  MARKET_TYPE_KOSPI = 1;
  // KOSDAQ
  MARKET_TYPE_KOSDAQ = 2;
  // 파생상품
  MARKET_TYPE_DERIVATIVE = 3;
}

// 상품 타입
enum ProductType {
  PRODUCT_TYPE_UNSPECIFIED = 0;
  PRODUCT_TYPE_STOCK = 1;
  PRODUCT_TYPE_FUTURES = 2;
  PRODUCT_TYPE_ETF = 3;
  PRODUCT_TYPE_CASH = 4;
}

// 거래 세션 타입
enum TradingSession {
  TRADING_SESSION_UNSPECIFIED = 0;
  TRADING_SESSION_PRE_MARKET = 1;       // 장 시작 전
  TRADING_SESSION_OPENING_AUCTION = 2;  // 시가 동시호가 (08:30 ~ 09:00)
  TRADING_SESSION_REGULAR = 3;          // 장중 (09:00 ~ 15:20)
  TRADING_SESSION_CLOSING_AUCTION = 4;  // 종가 동시호가 (15:20 ~ 15:30)
  TRADING_SESSION_CLOSED = 5;           // 장 종료
}

// 호가조건코드 (KRX)
// 주문 체결 방식을 지정하는 조건
enum OrderConditionType {
  // 미지정 (기본값: FAS로 처리, 하위 호환)
  ORDER_CONDITION_TYPE_UNSPECIFIED = 0;
  // Fill-and-Store: 체결 후 잔량은 호가창에 유지 (일반 지정가) — KRX code "0"
  ORDER_CONDITION_TYPE_FAS = 1;
  // Fill-and-Kill (IOC): 체결 후 잔량 즉시 취소 — KRX code "3"
  ORDER_CONDITION_TYPE_FAK = 2;
  // Fill-or-Kill: 전량 체결 아니면 전량 취소 — KRX code "4"
  ORDER_CONDITION_TYPE_FOK = 3;
}

// ETF 가격 산출 방식
message EtfPricing {
  oneof method {
    // 분해 헷지 방식
    PdfNavHedgePricing pdf_nav_hedge = 1;

    // 선물 헷지 방식
    IndexTrackingHedgePricing index_tracking_hedge = 2;

    FutureBasis future_basis = 3;

    // 레버리지 선물 방식
    LeverageFuturePricing leverage_future = 4;

    // PDF 재귀 분해 헷지 방식: leaf가 단일 종목으로 귀결되는 ETF에 대한 프라이싱
    PdfDecomposeHedgePricing pdf_decompose_hedge = 5;
  }
}

// 분해 헷지 가격 산출 (추가 파라미터 없음)
message PdfNavHedgePricing {}

// 선물 헷지 가격 산출
message IndexTrackingHedgePricing {}

message FutureBasis {
  string prev_index = 1;
}

// 레버리지 선물 가격 산출
message LeverageFuturePricing {
  // 기초지수 전일종가
  double prev_index = 1;

  // 선물 전일종가
  double prev_future = 2;
}

// PDF 재귀 분해 헷지 가격 산출 (파라미터 없음)
// NAV 계산은 Etf.decomposed_constituents를 PdfNavHedge와 동일 공식으로 적용.
message PdfDecomposeHedgePricing {
  reserved 1;
  reserved "ratio_per_share";
}

// 자동정정 전략 유형
enum AmendMethodType {
  // 미지정 (기본값: TIMED_MARKET으로 처리)
  AMEND_METHOD_TYPE_UNSPECIFIED = 0;

  // 적극적 정정: 반대편 잔량 비율이 임계값 이상이면 즉시 체결 시도
  AMEND_METHOD_TYPE_AGGRESSIVE = 1;

  // 회피적 정정: tick_offset 만큼 가격을 조정하여 미체결 유지
  AMEND_METHOD_TYPE_EVASIVE = 2;

  // 최우선 호가: 상대방 최우선 호가로 정정
  AMEND_METHOD_TYPE_BEST_PRICE = 3;

  // 손절 정정: tick_threshold 이상 불리해지면 시장가로 전환
  AMEND_METHOD_TYPE_STOP_LOSS = 4;

  // 시간 제한 시장가: timeout 후 시장가로 전환
  AMEND_METHOD_TYPE_TIMED_MARKET = 5;
}

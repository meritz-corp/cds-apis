syntax = "proto3";

package kdo.v1.lead_lag_v2;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/resource.proto";
import "google/api/client.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// LeadLagV2Service - 선물-ETF 선행 차익거래 관리 서비스 (V2)
service LeadLagV2Service {
  // 단일 LeadLagV2 조회
  rpc GetLeadLagV2(GetLeadLagV2Request) returns (LeadLagV2) {
    option (google.api.http) = {
      get: "/v1/{lead_lag_v2=lead_lag_v2s/*}"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // LeadLagV2 목록 조회
  rpc ListLeadLagV2s(ListLeadLagV2sRequest) returns (ListLeadLagV2sResponse) {
    option (google.api.http) = {
      get: "/v1/lead_lag_v2s"
    };
    option (google.api.method_signature) = "";
  }

  // LeadLagV2 생성
  rpc CreateLeadLagV2(CreateLeadLagV2Request) returns (LeadLagV2) {
    option (google.api.http) = {
      post: "/v1/lead_lag_v2s"
      body: "lead_lag_v2"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // LeadLagV2 수정
  rpc UpdateLeadLagV2(UpdateLeadLagV2Request) returns (LeadLagV2) {
    option (google.api.http) = {
      patch: "/v1/{lead_lag_v2.name=lead_lag_v2s/*}"
      body: "lead_lag_v2"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // LeadLagV2 삭제
  rpc DeleteLeadLagV2(DeleteLeadLagV2Request) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{lead_lag_v2=lead_lag_v2s/*}"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // LeadLagV2 활성화/비활성화
  rpc SetLeadLagV2Active(SetLeadLagV2ActiveRequest) returns (LeadLagV2) {
    option (google.api.http) = {
      post: "/v1/{lead_lag_v2=lead_lag_v2s/*}:setActive"
      body: "*"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // LeadLagV2 현재 상태 단건 조회 (unary)
  rpc GetLeadLagV2Status(GetLeadLagV2StatusRequest) returns (LeadLagV2StatusUpdate) {
    option (google.api.http) = {
      get: "/v1/{lead_lag_v2=lead_lag_v2s/*}:status"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // LeadLagV2 실시간 상태 스트리밍 (서버→클라이언트)
  rpc StreamLeadLagV2Status(StreamLeadLagV2StatusRequest) returns (stream LeadLagV2StatusUpdate) {
    option (google.api.http) = {
      get: "/v1/{lead_lag_v2=lead_lag_v2s/*}:streamStatus"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // LeadLagV2 전략 시작 (hot loop 시작)
  rpc StartLeadLagV2(StartLeadLagV2Request) returns (StartLeadLagV2Response) {
    option (google.api.http) = {
      post: "/v1/{lead_lag_v2=lead_lag_v2s/*}:start"
      body: "*"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // LeadLagV2 전략 중지 (hot loop 중지)
  rpc StopLeadLagV2(StopLeadLagV2Request) returns (StopLeadLagV2Response) {
    option (google.api.http) = {
      post: "/v1/{lead_lag_v2=lead_lag_v2s/*}:stop"
      body: "*"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // 체결 내역 목록 조회 (DB 저장된 과거 체결 기록, 페이징)
  rpc ListLeadLagV2Trades(ListLeadLagV2TradesRequest) returns (ListLeadLagV2TradesResponse) {
    option (google.api.http) = {
      get: "/v1/{lead_lag_v2=lead_lag_v2s/*}/trades"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }

  // 단일 체결 내역 조회
  rpc GetLeadLagV2Trade(GetLeadLagV2TradeRequest) returns (LeadLagV2TradeRecord) {
    option (google.api.http) = {
      get: "/v1/{lead_lag_v2=lead_lag_v2s/*}/trades/{trade_id}"
    };
  }

  // LeadLagV2 체결 현황 요약 (선물/ETF 레그별 체결수량, 체결단가, 순매매)
  rpc GetLeadLagV2ExecutionSummary(GetLeadLagV2ExecutionSummaryRequest) returns (LeadLagV2ExecutionSummaryResponse) {
    option (google.api.http) = {
      get: "/v1/{lead_lag_v2=lead_lag_v2s/*}:executionSummary"
    };
    option (google.api.method_signature) = "lead_lag_v2";
  }
}

// ============================================================================
// LeadLagV2 Entity
// ============================================================================

// 선물-ETF 선행 차익거래 설정 (V2 — is_etf_inverse 제거, 스프레드 기반 트리거)
message LeadLagV2 {
  option (google.api.resource) = {
    type: "kdo.cdsapis.xyz/LeadLagV2"
    pattern: "lead_lag_v2s/{lead_lag_v2}"
  };

  // 리소스 이름 (lead_lag_v2s/{id})
  string name = 1;

  // LeadLagV2 ID
  int32 id = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 전략 이름 (고유)
  string display_name = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 선물 ISIN 코드
  string futures_isin = 4 [
    (google.api.field_behavior) = REQUIRED
  ];

  // ETF ISIN 코드
  string etf_isin = 5 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 선물 펀드코드
  string futures_fund_code = 6 [
    (google.api.field_behavior) = REQUIRED
  ];

  // ETF 펀드코드
  string etf_fund_code = 7 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 트리거 설정 (V2)
  LeadLagV2TriggerConfig trigger_config = 8;

  // 활성화 여부
  bool is_active = 9;

  // 생성 시간
  google.protobuf.Timestamp create_time = 10 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 수정 시간
  google.protobuf.Timestamp update_time = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// ============================================================================
// Trigger Configuration (V2)
// ============================================================================

// 스프레드 기반 트리거 설정 (V2)
message LeadLagV2TriggerConfig {
  // 매수 스프레드 임계값 (틱 단위, 매수 트리거 조건)
  int64 buy_adjustment = 1;

  // 매도 스프레드 임계값 (틱 단위, 매도 트리거 조건)
  int64 sell_adjustment = 2;

  // 검증 대기시간 (마이크로초) — 트리거 후 스프레드 재확인 대기
  uint64 verify_wait_us = 3;

  // 재트리거 쿨다운 (밀리초)
  uint64 cooldown_ms = 4;

  // ETF 매수 포지션 상한
  int64 max_bid_position = 5;

  // ETF 매도 포지션 상한
  int64 max_ask_position = 6;

  // ETF 주문 수량
  int64 etf_order_quantity = 7;

  // 선물 주문 수량 (계약 수)
  int64 futures_order_quantity = 8;
}

// ============================================================================
// Request/Response Messages
// ============================================================================

message GetLeadLagV2Request {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];
}

message ListLeadLagV2sRequest {
  // 페이지 크기 (optional)
  optional int32 page_size = 1;

  // 페이지 토큰 (optional, for pagination)
  optional string page_token = 2;

  // 필터링 조건 (optional, AIP-160)
  //
  // Available Fields:
  // * is_active - 활성화 여부
  //
  // Examples:
  // * is_active=true
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];
}

message ListLeadLagV2sResponse {
  // LeadLagV2 목록
  repeated LeadLagV2 lead_lag_v2s = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

message CreateLeadLagV2Request {
  // 생성할 LeadLagV2
  LeadLagV2 lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message UpdateLeadLagV2Request {
  // 수정할 LeadLagV2
  LeadLagV2 lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message DeleteLeadLagV2Request {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];
}

message SetLeadLagV2ActiveRequest {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];

  // 활성화 여부
  bool is_active = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// LeadLagV2 전략 시작 요청
message StartLeadLagV2Request {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];
}

// LeadLagV2 전략 시작 응답
message StartLeadLagV2Response {
  // 현재 실행 상태
  LeadLagV2State state = 1;
  // 응답 메시지
  string message = 2;
}

// LeadLagV2 전략 중지 요청
message StopLeadLagV2Request {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];
}

// LeadLagV2 전략 중지 응답
message StopLeadLagV2Response {
  // 현재 실행 상태
  LeadLagV2State state = 1;
  // 응답 메시지
  string message = 2;
}

// ============================================================================
// Execution Summary (체결 현황 요약)
// ============================================================================

// 체결 현황 요약 요청
message GetLeadLagV2ExecutionSummaryRequest {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];

  // 조회 시작 날짜 (YYYYMMDD 정수, 포함). 미지정 시 전체 기간
  optional int32 start_date = 2;

  // 조회 종료 날짜 (YYYYMMDD 정수, 포함). 미지정 시 전체 기간
  optional int32 end_date = 3;
}

// 체결 현황 요약 응답
message LeadLagV2ExecutionSummaryResponse {
  // 선물 레그 체결 현황
  LeadLagV2LegExecutionSummary futures = 1;

  // ETF 레그 체결 현황
  LeadLagV2LegExecutionSummary etf = 2;

  // 스프레드 (선물-ETF 체결단가 차이)
  optional double spread = 3;
}

// 개별 레그 체결 현황
message LeadLagV2LegExecutionSummary {
  // 매도 체결수량
  int64 sell_filled_qty = 1;

  // 매수 체결수량
  int64 buy_filled_qty = 2;

  // 매도 평균 체결단가
  optional double sell_avg_price = 3;

  // 매수 평균 체결단가
  optional double buy_avg_price = 4;

  // 순매매 (매수체결수량 - 매도체결수량)
  int64 net_qty = 5;
}

// ============================================================================
// Streaming Status Messages
// ============================================================================

// LeadLagV2 현재 상태 단건 조회 요청
message GetLeadLagV2StatusRequest {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];
}

// LeadLagV2 실시간 상태 스트리밍 요청
message StreamLeadLagV2StatusRequest {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];
}

// LeadLagV2 실시간 상태 업데이트 (delta 방식: 변경된 필드만 전송)
message LeadLagV2StatusUpdate {
  // 전략 ID
  int32 lead_lag_v2_id = 1;

  // 서비스 실행 상태 (변경 시에만 전송)
  optional LeadLagV2State state = 2;

  // 현재 선물 포지션 (양수=롱, 음수=숏)
  optional int64 futures_position = 3;

  // 총 트레이드 수
  optional uint64 total_trades = 4;

  // 마지막 선물 mid price
  optional double last_futures_price = 5;

  // 마지막 시그널 정보 (변경 시에만 전송)
  optional LeadLagV2SignalInfo last_signal = 6;

  // 스프레드 상태 (bid1/ask1 정보)
  optional LeadLagV2SpreadInfo spread_info = 7;

  // 주문 실행 지연시간 (마이크로초)
  optional uint64 latency_us = 8;

  // 타임스탬프 (마이크로초)
  uint64 timestamp_us = 9;

  // 현재 ETF 포지션 (양수=롱, 음수=숏)
  optional int64 etf_position = 10;
}

// LeadLagV2 서비스 실행 상태
enum LeadLagV2State {
  LEAD_LAG_V2_STATE_UNSPECIFIED = 0;
  LEAD_LAG_V2_STATE_IDLE = 1;
  LEAD_LAG_V2_STATE_MONITORING = 2;
  LEAD_LAG_V2_STATE_TRIGGERED = 3;
  LEAD_LAG_V2_STATE_ERROR = 4;
}

// 시그널 상세 정보 (V2 — spread 기반)
message LeadLagV2SignalInfo {
  // 시그널 방향 (BID/ASK)
  string direction = 1;

  // 스프레드 값 (틱 단위)
  int64 spread = 2;

  // 선물 주문 방향 (BID/ASK)
  string futures_side = 3;

  // ETF 주문 방향 (BID/ASK)
  string etf_side = 4;

  // 선물 주문 가격
  double futures_price = 5;

  // ETF 주문 가격
  double etf_price = 6;

  // 선물 주문 수량
  int64 futures_qty = 7;

  // ETF 주문 수량
  int64 etf_qty = 8;

  // ETF FOK 주문 결과 ("FILLED" 또는 "AUTO_CANCELLED")
  string etf_fok_status = 9;
}

// 스프레드 상태 정보 (선물/ETF 호가 정보)
message LeadLagV2SpreadInfo {
  // ETF 매수 1호가
  optional double etf_bid1 = 1;

  // ETF 매도 1호가
  optional double etf_ask1 = 2;

  // 선물 매수 1호가
  optional double futures_bid1 = 3;

  // 선물 매도 1호가
  optional double futures_ask1 = 4;
}

// ============================================================================
// Trade History (DB 영구 저장 체결 기록)
// ============================================================================

// 체결 기록 (DB에 영구 저장되는 트레이드 레코드, V2)
message LeadLagV2TradeRecord {
  // DB ID
  int64 id = 1;

  // 부모 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];

  // 세션 내 순차 트레이드 번호
  int64 trade_number = 3;

  // 시그널 방향 (BID/ASK)
  string direction = 4;

  // 스프레드 값 (틱 단위)
  int64 spread = 5;

  // 선물 주문 방향 (BID/ASK)
  string futures_side = 6;

  // ETF 주문 방향 (BID/ASK)
  string etf_side = 7;

  // 선물 주문 가격
  double futures_price = 8;

  // ETF 주문 가격
  double etf_price = 9;

  // 선물 주문 수량
  int64 futures_qty = 10;

  // ETF 주문 수량
  int64 etf_qty = 11;

  // 체결 후 선물 포지션
  int64 futures_position_after = 12;

  // 주문 실행 지연시간 (마이크로초)
  uint64 latency_us = 13;

  // 거래일 (YYYYMMDD)
  int32 date = 14;

  // 생성 시각
  google.protobuf.Timestamp created_at = 15 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // 주문제출시간 (HHMMSSuuuuuu KST)
  int64 send_order_time = 16;

  // 트리거한 시세의 거래소 시간 (HHMMSSuuuuuu KST)
  int64 trigger_exchange_time = 17;

  // 선물 체결시간 (HHMMSSuuuuuu KST)
  int64 futures_filled_time = 18;

  // ETF 체결시간 (HHMMSSuuuuuu KST)
  int64 etf_filled_time = 19;

  // 트리거 당시 선물 가격 (시그널 발생 시점의 호가)
  double futures_trigger_price = 20;

  // 트리거 당시 ETF 가격 (시그널 발생 시점의 호가)
  double etf_trigger_price = 21;

  // ETF FOK 주문 결과 ("FILLED" 또는 "AUTO_CANCELLED")
  string etf_fok_status = 22;
}

// 체결 내역 목록 요청
message ListLeadLagV2TradesRequest {
  // 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];

  // 페이지 크기 (기본: 50, 최대: 200)
  optional int32 page_size = 2;

  // 페이지 토큰 (다음 페이지 조회용)
  optional string page_token = 3;

  // 필터링 조건
  // Available Fields:
  // * date - 거래일 (YYYYMMDD), 예: date=20260228
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // 정렬 기준 (기본: send_order_time DESC)
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // 조회 시작 날짜 (YYYYMMDD 정수, 포함). filter의 date와 별도로 범위 검색용
  optional int32 start_date = 6;

  // 조회 종료 날짜 (YYYYMMDD 정수, 포함)
  optional int32 end_date = 7;
}

// 체결 내역 목록 응답
message ListLeadLagV2TradesResponse {
  // 체결 기록 목록
  repeated LeadLagV2TradeRecord trades = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;

  // 전체 건수
  int32 total_count = 3;
}

// 단일 체결 내역 조회 요청
message GetLeadLagV2TradeRequest {
  // 부모 리소스 이름 (lead_lag_v2s/{id})
  string lead_lag_v2 = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/LeadLagV2"
    }
  ];

  // 체결 기록 ID
  int64 trade_id = 2 [(google.api.field_behavior) = REQUIRED];
}

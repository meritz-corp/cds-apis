syntax = "proto3";

package kdo.v1.mm_v2;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/resource.proto";
import "google/api/client.proto";
import "kdo/v1/common.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// MM v2 서비스는 ETF Market Making v2 관련 서비스를 제공합니다.
// LP 대비 차이: hedge 없음, ExposureSkew 기반 모드 전환, position_adjustment 없음.
service MmV2Service {
  // ETF MM v2 조회
  rpc GetEtfMmV2(GetEtfMmV2Request) returns (EtfMmV2) {
    option (google.api.http) = {
      get: "/v1/mm_v2/{etf=etfs/*}/{fund=funds/*}"
    };
    option (google.api.method_signature) = "";
  }

  // ETF MM v2 목록 조회
  rpc ListEtfMmV2s(ListEtfMmV2sRequest) returns (ListEtfMmV2sResponse) {
    option (google.api.http) = {
      get: "/v1/mm_v2"
    };
    option (google.api.method_signature) = "";
  }

  // ETF MM v2 업데이트
  rpc UpdateEtfMmV2(UpdateEtfMmV2Request) returns (EtfMmV2) {
    option (google.api.http) = {
      patch: "/v1/mm_v2/etfs/{symbol=*}/funds/{fund_code=*}"
      body: "*"
    };
    option (google.api.method_signature) = "symbol,fund_code";
  }

  // ETF MM v2 상태 조회
  rpc GetEtfMmV2Status(GetEtfMmV2StatusRequest) returns (EtfMmV2Status) {
    option (google.api.http) = {
      get: "/v1/mm_v2/{etf=etfs/*}/{fund=funds/*}/status"
    };
    option (google.api.method_signature) = "etf,fund";
  }

  // ETF MM v2 상태 목록 조회
  rpc ListEtfMmV2Statuses(ListEtfMmV2StatusesRequest) returns (ListEtfMmV2StatusesResponse) {
    option (google.api.http) = {
      get: "/v1/mm_v2/etfs/*/funds/*/status"
    };
    option (google.api.method_signature) = "";
  }

  // ETF MM v2 상태 스트리밍 (실시간 업데이트)
  rpc StreamEtfMmV2StatusUpdate(StreamEtfMmV2StatusUpdateRequest) returns (stream EtfMmV2StatusUpdate) {
    option (google.api.http) = {
      get: "/v1/mm_v2/{etf=etfs/*}/{fund=funds/*}/status_update:stream"
    };
    option (google.api.method_signature) = "etf,fund";
  }

  // ETF MM v2 시작
  rpc StartEtfMmV2(StartEtfMmV2Request) returns (StartEtfMmV2Response) {
    option (google.api.http) = {
      post: "/v1/mm_v2/{etf=etfs/*}/{fund=funds/*}:start"
      body: "*"
    };
  }

  // ETF MM v2 중지
  rpc StopEtfMmV2(StopEtfMmV2Request) returns (StopEtfMmV2Response) {
    option (google.api.http) = {
      post: "/v1/mm_v2/{etf=etfs/*}/{fund=funds/*}:stop"
      body: "*"
    };
  }

  // 사용자 주문장 조회
  rpc GetUserOrderbook(GetUserOrderBookRequest) returns (UserOrderbookData) {
    option (google.api.http) = {
      get: "/v1/mm_v2/{etf=etfs/*}/{fund=funds/*}/orderbook"
    };
  }

  // 사용자 주문장 스트리밍
  rpc StreamUserOrderbook(GetUserOrderBookRequest) returns (stream UserOrderbookData) {
    option (google.api.http) = {
      get: "/v1/mm_v2/{etf=etfs/*}/{fund=funds/*}/orderbook:stream"
    };
  }

  // 사용자 주문 오더북을 강제로 비웁니다.
  // MM v2 가 Running 상태일 때는 호출 불가 (FailedPrecondition 반환).
  // MM v2 가 Idle / Stopping / Error 상태일 때만 사용 가능.
  rpc ClearUserOrderBook(ClearUserOrderBookRequest) returns (ClearUserOrderBookResponse) {
    option (google.api.http) = {
      post: "/v1/mm_v2/{etf=etfs/*}/{fund=funds/*}:clearOrderBook"
      body: "*"
    };
  }
}

// ETF MM v2 설정
// LP 대비 차이: hedge 필드 없음, position_adjustment 없음, ExposureSkew + momentum_deadband_ticks 추가.
message EtfMmV2 {
  // ETF 심볼
  string symbol = 1;

  // Fund
  string fund_code = 2;

  // 매도 basis 스프레드
  double ask_basis = 3;

  // 매수 basis 스프레드
  double bid_basis = 4;

  // 호가 깊이 (양방향 레벨 수)
  uint32 depth = 8;

  // ETF tick 크기 (원 단위, i64)
  int64 tick_size = 9;

  // 동적 offset 조정 설정
  EtfMmV2Offset offset = 10;

  // 활성화 여부
  bool enabled = 11;

  // ETF 가격 산출 방식
  kdo.v1.common.EtfPricing pricing_method = 12;

  // 매수 호가 조정값
  optional double bid_adjustment = 13;

  // 매도 호가 조정값
  optional double ask_adjustment = 14;

  // 매수 주문 수량 (i64)
  int64 bid_quantity = 15;

  // 매도 주문 수량 (i64)
  int64 ask_quantity = 16;

  // 모멘텀 활성화 여부
  optional bool momentum_enabled = 17;

  // 모멘텀 윈도우 크기
  optional uint32 momentum_window = 18;

  // 모멘텀 민감도
  optional double momentum_sensitivity = 19;

  // 매수/매도 수량 한도
  optional EtfMmV2QuantityLimit quantity_limit = 20;

  // precomputed quote retreat 처리 정책
  optional PrecomputePolicy precompute_policy = 21;

  // pricing source 선물 1호가 잔량 imbalance guard 활성화 여부
  bool pricing_source_liquidity_imbalance_guard_enabled = 22;

  // 모멘텀 활성 판정 deadband (틱 수).
  // |bid_adj| 또는 |ask_adj|가 이 틱 수 이상이어야 Momentum 모드로 진입.
  // 0이면 모멘텀 enabled만으로 활성 판정.
  int32 momentum_deadband_ticks = 23;

  // ExposureSkew 활성화 여부 (MM v2 모드 2: 누적 노출 균형)
  bool exposure_skew_enabled = 24;

  // ExposureSkew 활성화 임계값 (순포지션 절댓값이 이 값 이상이면 skew 활성화)
  int64 exposure_skew_trigger_quantity = 25;

  // ExposureSkew 포화 임계값 (순포지션 절댓값이 이 값에 도달하면 max_skew_ticks 적용)
  int64 exposure_skew_limit_quantity = 26;

  // ExposureSkew 최대 틱 수 (양방향 호가 평행이동 상한)
  int32 exposure_skew_max_skew_ticks = 27;
}

// 매수/매도 수량 한도
message EtfMmV2QuantityLimit {
  // 매수 수량 상한 (gross 누적 매수 체결 기준)
  int64 max_bid_quantity = 2;
  // 매도 수량 상한 (gross 누적 매도 체결 기준)
  int64 max_ask_quantity = 4;

  // 순포지션 (+ = 순매수, - = 순매도): gross_bid - gross_ask
  optional int64 net_quantity = 5;

  // 순포지션 한도 설정값
  optional int64 max_net_quantity = 6;
}

// MM v2 운영 모드
// 우선순위: Momentum > ExposureBalance > Neutral
enum MmV2Mode {
  MM_V2_MODE_UNSPECIFIED = 0;
  // 선물 모멘텀 추종 모드 (deadband 이상의 모멘텀 감지 시)
  MM_V2_MODE_MOMENTUM = 1;
  // 누적 노출 균형 모드 (모멘텀 비활성 + 순포지션이 trigger 초과 시)
  MM_V2_MODE_EXPOSURE_BALANCE = 2;
  // 중립 모드 (모멘텀/ExposureSkew 모두 비활성)
  MM_V2_MODE_NEUTRAL = 3;
}

// precomputed quote retreat 처리 정책
enum PrecomputePolicy {
  PRECOMPUTE_POLICY_UNSPECIFIED = 0;
  // 선물 1틱 ↔ ETF 1틱 (1:1 대응). 빠른 추격.
  PRECOMPUTE_POLICY_ONE_TO_ONE = 1;
  // 선물 N틱 ↔ ETF 1틱 (N:1 대응, N≥3). 정석. 항상 정확한 호가 유지.
  PRECOMPUTE_POLICY_MANY_TO_ONE = 2;
  // 선물 1틱 ↔ ETF N틱 (1:N 대응). 고가 레버리지 ETF용.
  PRECOMPUTE_POLICY_ONE_TO_MANY = 3;
}

// pricing source 선물 1호가 잔량 imbalance guard 상태
enum PricingSourceLiquidityImbalanceGuardState {
  PRICING_SOURCE_LIQUIDITY_IMBALANCE_GUARD_STATE_UNSPECIFIED = 0;
  PRICING_SOURCE_LIQUIDITY_IMBALANCE_GUARD_STATE_NORMAL = 1;
  PRICING_SOURCE_LIQUIDITY_IMBALANCE_GUARD_STATE_BID_THIN = 2;
  PRICING_SOURCE_LIQUIDITY_IMBALANCE_GUARD_STATE_ASK_THIN = 3;
}

// 자동 offset 조정 설정
// MM v2는 순매매량 기반 조정을 ExposureSkew가 담당하므로 position_adjustment 필드 없음.
message EtfMmV2Offset {
  optional double bid_offset = 1;
  optional double ask_offset = 2;

  // NAV 밴드 설정
  optional double min_offset = 3;
  optional double max_offset = 4;

  // 시간 기반 조정
  optional bool time_adjustment_enabled = 7;
  optional uint64 adjustment_interval_secs = 8;
  optional double adjustment_step = 9;
  optional bool reset_on_fill = 10;

  // 누적 순포지션 런타임 값 (런타임 추적값 - 상태 조회 시 노출)
  int64 net_position = 21;
}

// ========== ETF MM v2 Status Messages ==========

// ETF MM v2 상태
message EtfMmV2Status {
  // ETF 심볼
  string etf_symbol = 1;

  // 펀드 코드
  string fund_code = 2;

  // Basis 스프레드
  optional double ask_basis = 3;
  optional double bid_basis = 4;

  // MM v2 상태
  EtfMmV2State state = 8;

  // 가격 정보
  MmV2Pricing pricing = 9;

  // 체결 통계
  FillStatistics fill_statistics = 10;

  // 동적 offset 조정 설정
  EtfMmV2Offset offset = 11;

  // 매수 호가 조정값
  optional double bid_adjustment = 13;

  // 매도 호가 조정값
  optional double ask_adjustment = 14;

  // 매수 주문 수량
  int64 bid_quantity = 15;

  // 매도 주문 수량
  int64 ask_quantity = 16;

  // 모멘텀 활성화 여부
  optional bool momentum_enabled = 17;

  // 모멘텀 윈도우 크기
  optional uint32 momentum_window = 18;

  // 모멘텀 민감도
  optional double momentum_sensitivity = 19;

  // 런타임 계산된 모멘텀 매수 호가 조정값
  optional double momentum_bid_adjustment = 20;

  // 런타임 계산된 모멘텀 매도 호가 조정값
  optional double momentum_ask_adjustment = 21;

  // 매수/매도 수량 한도
  optional EtfMmV2QuantityLimit quantity_limit = 22;

  // precomputed quote retreat 처리 정책
  optional PrecomputePolicy precompute_policy = 23;

  // 호가 깊이 (양방향 레벨 수)
  uint32 depth = 24;

  // pricing source 선물 1호가 잔량 imbalance guard 활성화 여부
  bool pricing_source_liquidity_imbalance_guard_enabled = 25;

  // ── MM v2 모드 런타임 상태 ──

  // 현재 운영 모드 (Momentum / ExposureBalance / Neutral)
  MmV2Mode mode = 30;

  // 모멘텀 활성 판정 여부 (deadband 통과 여부)
  bool momentum_active = 31;

  // 누적 노출 (signed). bid 체결 += qty, ask 체결 -= qty
  int64 net_position = 32;

  // ExposureSkew가 산출한 부호 있는 틱. 0이면 비활성
  int32 exposure_skew_ticks = 33;

  // volume-weighted 누적 매수 평균 체결가 (매수 체결 없으면 absent)
  optional double avg_buy_price = 34;

  // volume-weighted 누적 매도 평균 체결가 (매도 체결 없으면 absent)
  optional double avg_sell_price = 35;
}

// ETF MM v2 상태 업데이트 메시지 (변화된 필드만 포함)
message EtfMmV2StatusUpdate {
  // ETF 심볼
  string etf_symbol = 1;

  // 펀드 코드
  string fund_code = 2;

  // Basis 스프레드
  optional double ask_basis = 3;
  optional double bid_basis = 4;

  // MM v2 상태
  optional EtfMmV2State state = 8;

  // 가격 정보
  optional MmV2Pricing pricing = 9;

  // 체결 통계
  optional FillStatistics fill_statistics = 10;

  // 동적 offset 조정 설정
  optional EtfMmV2Offset offset = 11;

  // 매수 호가 조정값
  optional double bid_adjustment = 12;

  // 매도 호가 조정값
  optional double ask_adjustment = 13;

  // 매수 주문 수량
  optional int64 bid_quantity = 14;

  // 매도 주문 수량
  optional int64 ask_quantity = 15;

  // 모멘텀 활성화 여부
  optional bool momentum_enabled = 16;

  // 모멘텀 윈도우 크기
  optional uint32 momentum_window = 17;

  // 모멘텀 민감도
  optional double momentum_sensitivity = 18;

  // 런타임 계산된 모멘텀 매수 호가 조정값
  optional double momentum_bid_adjustment = 19;

  // 런타임 계산된 모멘텀 매도 호가 조정값
  optional double momentum_ask_adjustment = 20;

  // 매수/매도 수량 한도
  optional EtfMmV2QuantityLimit quantity_limit = 21;

  // precomputed quote retreat 처리 정책
  optional PrecomputePolicy precompute_policy = 22;

  // 호가 깊이 (변경 시에만 Some)
  optional uint32 depth = 23;

  // pricing source 선물 1호가 잔량 imbalance guard 상태 (변경 시에만 Some)
  optional PricingSourceLiquidityImbalanceGuardState pricing_source_liquidity_imbalance_guard_state = 24;
}

// ETF 체결 통계 (매수/매도 체결량 및 평균 단가)
message FillStatistics {
  // 매수 체결량
  int64 buy_filled_quantity = 1;

  // 매도 체결량
  int64 sell_filled_quantity = 2;

  // 매수 총금액 (평균 단가 계산용)
  string buy_total_amount = 3;

  // 매도 총금액 (평균 단가 계산용)
  string sell_total_amount = 4;
}

// ETF MM v2 상태 enum
enum EtfMmV2State {
  ETF_MM_V2_STATE_UNSPECIFIED = 0;
  ETF_MM_V2_STATE_IDLE = 1;
  ETF_MM_V2_STATE_RUNNING = 2;
  ETF_MM_V2_STATE_STOPPING = 3;
  ETF_MM_V2_STATE_ERROR = 4;
}

// MM v2 가격 정보
message MmV2Pricing {
  string etf_ask_quote = 1;
  string etf_bid_quote = 2;
  string etf_ask_nav = 3;
  string etf_bid_nav = 4;
}

// 시간 프레임별 상태
message TimeFrameStatus {
  uint64 window_seconds = 1;
  uint32 current_count = 2;
  uint32 max_orders = 3;
  double usage_percent = 4;
}

// ========== Request/Response Messages ==========

// GetEtfMmV2
message GetEtfMmV2Request {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// ListEtfMmV2s
message ListEtfMmV2sRequest {
  optional uint32 page_size = 1;
  optional string page_token = 2;

  // Available Sequence and Operator
  // * etf_symbol
  //   * `equal`, `contains`
  // * fund_code
  //   * `equal`, `contains`
  string filter = 3;
}

message ListEtfMmV2sResponse {
  repeated EtfMmV2 etf_mm_v2s = 1;
  string next_page_token = 2;
}

// ListEtfMmV2Statuses
message ListEtfMmV2StatusesRequest {
  optional uint32 page_size = 1;
  optional string page_token = 2;

  // Available Sequence and Operator
  // * etf_symbol: `equal`, `contains`
  // * fund_code: `equal`, `contains`
  // * state: `equal`
  // * fill_statistics.buy_filled_quantity: `greater_than`, `less_than`
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];

  // Supported Fields: "fill_statistics.buy_filled_quantity", "fill_statistics.sell_filled_quantity"
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

message ListEtfMmV2StatusesResponse {
  repeated EtfMmV2Status etf_mm_v2_statuses = 1;
  string next_page_token = 2;
}

// UpdateEtfMmV2
message UpdateEtfMmV2Request {
  // ETF 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // 펀드 코드
  string fund_code = 2 [(google.api.field_behavior) = REQUIRED];

  // 호가 깊이
  optional uint32 depth = 4;

  // 동적 offset 조정 설정
  optional EtfMmV2Offset offset = 5;

  optional double ask_basis = 6;
  optional double bid_basis = 7;

  // 매수 주문 수량
  optional int64 bid_quantity = 8;

  // 매도 주문 수량
  optional int64 ask_quantity = 9;

  // 매수 호가 조정값
  optional double bid_adjustment = 10;

  // 매도 호가 조정값
  optional double ask_adjustment = 11;

  // 모멘텀 활성화 여부
  optional bool momentum_enabled = 12;

  // 모멘텀 윈도우 크기
  optional uint32 momentum_window = 13;

  // 모멘텀 민감도
  optional double momentum_sensitivity = 14;

  // 매수/매도 수량 한도
  optional EtfMmV2QuantityLimit quantity_limit = 15;

  // precomputed quote retreat 처리 정책
  optional PrecomputePolicy precompute_policy = 16;

  // pricing source 선물 1호가 잔량 imbalance guard 활성화 여부
  optional bool pricing_source_liquidity_imbalance_guard_enabled = 17;

  // 모멘텀 deadband 틱 수
  optional int32 momentum_deadband_ticks = 18;

  // ExposureSkew 설정 업데이트
  optional UpdateEtfMmV2ExposureSkewFields exposure_skew = 19;
}

// ExposureSkew 설정 업데이트 필드
message UpdateEtfMmV2ExposureSkewFields {
  optional bool enabled = 1;
  optional int64 trigger_quantity = 2;
  optional int64 limit_quantity = 3;
  optional int32 max_skew_ticks = 4;
}

// GetEtfMmV2Status
message GetEtfMmV2StatusRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// StreamEtfMmV2StatusUpdate
message StreamEtfMmV2StatusUpdateRequest {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// ETF MM v2 시작 요청
message StartEtfMmV2Request {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Etf"
    }
  ];

  string fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];
}

// ETF MM v2 시작 응답
message StartEtfMmV2Response {
  EtfMmV2Status status = 1;
  string message = 2;
}

// ETF MM v2 중지 요청
message StopEtfMmV2Request {
  string etf = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {

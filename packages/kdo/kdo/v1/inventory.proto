  // 대차신청일자
  string dbcr_aplt_date = 15;
  // 대차신청일련번호
  string dbcr_aplt_srno = 16;
  // 체결일자
  string cntg_date = 17;
  // 체결번호
  string cntg_no = 18;
  // 원체결일자

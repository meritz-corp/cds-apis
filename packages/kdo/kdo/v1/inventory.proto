syntax = "proto3";

package kdo.v1.inventory;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/api/client.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// InventoryService는 재고(주식/파생) 현황 관련 서비스를 제공합니다.
service InventoryService {
  // 단일 재고 현황 조회
  rpc GetInventory(GetInventoryRequest) returns (Inventory) {
    option (google.api.http) = {
      get: "/v1/inventories/{fund=funds/*}/{symbol=symbols/*}"
    };
    option (google.api.method_signature) = "fund,symbol";
  }

  // 단일 재고 현황 스트림
  rpc StreamInventory(GetInventoryRequest) returns (stream Inventory) {
    option (google.api.http) = {
      get: "/v1/inventories/{fund=funds/*}/{symbol=symbols/*}:stream"
    };
    option (google.api.method_signature) = "fund,symbol";
  }

  // 펀드별 재고 현황 목록 조회
  rpc ListInventories(ListInventoriesRequest) returns (ListInventoriesResponse) {
    option (google.api.http) = {
      get: "/v1/inventories/{fund=funds/*}"
    };
    option (google.api.method_signature) = "fund";
  }

  // 펀드별 재고 현황 목록 스트림
  rpc StreamInventories(ListInventoriesRequest) returns (stream ListInventoriesResponse) {
    option (google.api.http) = {
      get: "/v1/inventories/{fund=funds/*}:stream"
    };
    option (google.api.method_signature) = "fund";
  }

  // 원장 재고 목록 조회
  rpc ListLedgerInventories(ListLedgerInventoriesRequest) returns (ListLedgerInventoriesResponse) {
    option (google.api.http) = {
      get: "/v1/inventories/{fund=funds/*}/ledger"
    };
    option (google.api.method_signature) = "fund";
  }

  // 원장 재고 조회 (주식/파생 통합)
  rpc GetLedgerInventory(GetLedgerInventoryRequest) returns (LedgerInventory) {
    option (google.api.http) = {
      get: "/v1/inventories/{fund=funds/*}/{symbol=symbols/*}/ledger"
    };
    option (google.api.method_signature) = "fund,symbol";
  }

  // 재고 수정
  rpc UpdateInventory(UpdateInventoryRequest) returns (Inventory) {
    option (google.api.http) = {
      patch: "/v1/inventories/{fund=funds/*}/{symbol=symbols/*}"
      body: "*"
    };
    option (google.api.method_signature) = "fund,symbol";
  }

  // 원장에서 재고 동기화
  rpc SyncInventoryFromLedger(SyncInventoryFromLedgerRequest) returns (SyncInventoryFromLedgerResponse) {
    option (google.api.http) = {
      post: "/v1/inventories/{fund=funds/*}:sync"
      body: "*"
    };
    option (google.api.method_signature) = "fund";
  }

  // 대차 상환 (원장 즉시 차감)
  rpc RepayLoan(RepayLoanRequest) returns (RepayLoanResponse) {
    option (google.api.http) = {
      post: "/v1/inventories/{fund=funds/*}:repayLoan"
      body: "*"
    };
    option (google.api.method_signature) = "fund,symbol,quantity";
  }

  // 펀드간 대차 이전 (내부대차)
  rpc TransferLoan(TransferLoanRequest) returns (TransferLoanResponse) {
    option (google.api.http) = {
      post: "/v1/inventories/{from_fund=funds/*}:transferLoan"
      body: "*"
    };
    option (google.api.method_signature) = "from_fund,to_fund,symbol,quantity";
  }

  // 대차 인도내역 조회 (미처리 건 목록)
  rpc ListLoanDeliveries(ListLoanDeliveriesRequest) returns (ListLoanDeliveriesResponse) {
    option (google.api.http) = {
      get: "/v1/inventories/{fund=funds/*}/loanDeliveries"
    };
    option (google.api.method_signature) = "fund,date";
  }

  // 대차 인도내역 원장 반영 (선택 건 일괄 처리)
  rpc BatchProcessLoanDeliveries(BatchProcessLoanDeliveriesRequest) returns (BatchProcessLoanDeliveriesResponse) {
    option (google.api.http) = {
      post: "/v1/inventories/{fund=funds/*}/loanDeliveries:batchProcess"
      body: "*"
    };
    option (google.api.method_signature) = "fund,items";
  }

  // 대여 등록 (obfnp_loan_015a - 45221 화면)
  rpc RegisterLending(RegisterLendingRequest) returns (RegisterLendingResponse) {
    option (google.api.http) = {
      post: "/v1/inventories/{fund=funds/*}:registerLending"
      body: "*"
    };
    option (google.api.method_signature) = "fund,request,items";
  }

  // ========== 세션 인벤토리 (Session Inventory) ==========

  // 세션 인벤토리 할당.
  // LP 시작(StartEtfLp) 전에 global inventory 에서 매도 한도를 선점한다.
  // balance_override 가 0 이면 DB 의 lp.session_inventory_balance 를 사용한다.
  rpc AllocateSessionInventory(AllocateSessionInventoryRequest) returns (AllocateSessionInventoryResponse) {
    option (google.api.http) = {
      post: "/v1/inventories/{fund=funds/*}:allocateSession"
      body: "*"
    };
    option (google.api.method_signature) = "fund,symbol,service_name";
  }

  // 세션 인벤토리 해제.
  // 남은 balance 를 global inventory 에 반환한다.
  // selling > 0 (미체결 매도 잔량) 인 경우 FAILED_PRECONDITION 으로 거부된다.
  rpc ReleaseSessionInventory(ReleaseSessionInventoryRequest) returns (ReleaseSessionInventoryResponse) {
    option (google.api.http) = {
      post: "/v1/inventories/{fund=funds/*}:releaseSession"
      body: "*"
    };
    option (google.api.method_signature) = "fund,symbol,service_name";
  }

  // 세션 인벤토리 현재 상태 조회.
  rpc GetSessionInventory(GetSessionInventoryRequest) returns (SessionInventory) {
    option (google.api.http) = {
      get: "/v1/inventories/{fund=funds/*}/{symbol=symbols/*}:getSession"
    };
    option (google.api.method_signature) = "fund,symbol,service_name";
  }
}

// 상품포지션구분 (PROD_PSTN_CLS_CODE)
// 042c/052a InBlock2.PROD_PSTN_CLS_CODE: 1=상품, 2=매도
enum ProductPositionType {
  PRODUCT_POSITION_TYPE_UNSPECIFIED = 0;
  PRODUCT_POSITION_TYPE_STOCK = 1;   // 상품유가증권 (1=상품)
  PRODUCT_POSITION_TYPE_SELL = 2;    // 매도유가증권 (2=매도)
}

// 대차상대처구분코드 (DBCR_CNOF_CLS_CODE)
// obfnp_loan_021r 조회 필터: 1=예탁원, 2=증권금융, 빈값=전체
enum DbcrCnofClsCode {
  DBCR_CNOF_CLS_CODE_UNSPECIFIED = 0;       // 전체 조회
  DBCR_CNOF_CLS_CODE_DEPOSITORY = 1;        // 예탁원
  DBCR_CNOF_CLS_CODE_SECURITIES_FINANCE = 2; // 증권금융
}

// 대차구분코드 (DBCR_CLS_CODE)
// obfnp_loan_021r 조회 필터: 1=대여, 2=차입, 빈값=전체
enum DbcrClsCode {
  DBCR_CLS_CODE_UNSPECIFIED = 0; // 전체 조회
  DBCR_CLS_CODE_LEND = 1;        // 대여
  DBCR_CLS_CODE_BORROW = 2;      // 차입
}

// 처리구분 (PROS_CLS_CODE)
// 042c InBlock1.PROS_CLS_CODE: 1=상환, 2=대여
enum LoanTransactionType {
  LOAN_TRANSACTION_TYPE_UNSPECIFIED = 0;
  LOAN_TRANSACTION_TYPE_REPAY = 1;  // 상환
  LOAN_TRANSACTION_TYPE_LEND = 2;   // 대여
  reserved 3, 4, 5;                 // OTHER, FUND_REPAY, FUND_LEND (제거됨)
  reserved "LOAN_TRANSACTION_TYPE_OTHER", "LOAN_TRANSACTION_TYPE_FUND_REPAY", "LOAN_TRANSACTION_TYPE_FUND_LEND";
}

// 재고 유형
enum InventoryType {
  INVENTORY_TYPE_UNSPECIFIED = 0;
  INVENTORY_TYPE_STOCK = 1;  // 주식
  INVENTORY_TYPE_DERIV = 2;  // 파생상품
}

// 통합 재고 정보
message Inventory {
  // 종목 코드 (심볼)
  string symbol = 1;

  // 펀드 코드
  string fund_code = 2;

  // 재고 유형
  InventoryType inventory_type = 3;

  // 재고 유형별 데이터
  oneof data {
    // 주식 재고 데이터
    StockData stock = 10;
    // 파생상품 재고 데이터
    DerivData deriv = 11;
  }
}

// 원장 재고 정보 (주식/파생 통합)
message LedgerInventory {
  // 종목 코드
  string symbol = 1;

  // 펀드 코드
  string fund_code = 2;

  // 재고 유형
  InventoryType inventory_type = 3;

  // 유형별 원장 데이터
  oneof data {
    // 주식 원장 데이터
    LedgerStockData stock = 10;
    // 파생상품 원장 데이터
    LedgerDerivData deriv = 11;
  }
}

// 주식 원장 재고 데이터
message LedgerStockData {
  // 장부수량
  int64 book_quantity = 1;
  // 장부금액
  int64 book_amount = 2;
  // 대여수량
  int64 lending_quantity = 3;
  // 대주수량
  int64 borrowing_quantity = 4;
  // 매수청구수량
  int64 purchase_claim_quantity = 5;
  // 담보제공수량
  int64 collateral_quantity = 6;
  // 차입수량
  int64 borrow_quantity = 7;
  // 차입잔고수량
  int64 borrow_balance_quantity = 8;
  // 차입장부수량
  int64 borrow_book_quantity = 9;
  // 차입장부금액
  int64 borrow_book_amount = 10;
  // 차입대여수량
  int64 borrow_lending_quantity = 11;
  // 차입담보수량
  int64 borrow_collateral_quantity = 12;
  // 신청수량
  int64 application_quantity = 13;
  // 주문가능수량
  int64 orderable_quantity = 14;
  // 전일장부수량
  int64 prev_book_quantity = 15;
  // 전일매도장부수량
  int64 prev_borrow_book_quantity = 16;
  // 결제잔고
  int64 settlement_balance = 17;
  // 결제매도잔고
  int64 settlement_borrow_balance = 18;
}

// 파생상품 원장 재고 데이터
message LedgerDerivData {
  // 펀드명
  string fund_name = 1;
  // 한글종목명
  string item_name = 2;
  // 포지션구분명
  string position_type = 3;
  // 잔고수량
  int64 balance_quantity = 4;
  // 매입단가
  double entry_price = 5;
  // 장부금액
  int64 book_amount = 6;
  // 현재가격
  double current_price = 7;
  // 평가장부금액
  int64 valuation_amount = 8;
  // 당일평가손익금액
  int64 daily_pnl = 9;
  // 정산차금
  int64 settlement_diff = 10;
  // 수수료금액
  int64 fee_amount = 11;
  // 기초자산종목코드
  string underlying_code = 12;
  // 한글종목약어명
  string item_short_name = 13;
  // 거래승수
  double multiple = 14;
  // 스프레드근월물종목코드
  string spread_near_month_code = 15;
  // 한도금액
  int64 limit_amount = 16;
  // 잔여원화금액
  int64 remaining_krw_amount = 17;
}

// 주식 재고 데이터
// 일반가용과 차입가용의 이원화 구조
message StockData {
  // 전일잔고
  int64 prev_balance = 1;

  // 담보수량
  int64 pledged = 2;

  // 가용수량 (일반가용)
  int64 sellable = 3;

  // 차입가용수량
  int64 borrow_sellable = 4;

  // 차입수량
  int64 borrow_quantity = 5;

  // 장부수량
  int64 book_quantity = 6;

  // 장부금액 (원 단위)
  string book_amount = 7;

  // 매도예약수량 (내부용)
  int64 selling = 8;

  // 차입매도예약수량 (내부용)
  int64 borrow_selling = 9;

  // 차입매도수량 (내부용)
  int64 borrow_sold = 10;
}

// 파생상품 재고 데이터
// 단일 pending_quantity로 양방향 예약 관리
message DerivData {
  // 잔고수량 (양수: Long, 음수: Short)
  int64 quantity = 1;

  // 매입단가
  string entry_price = 2;

  // 장부금액
  string book_amount = 3;

  // 거래승수
  double multiple = 4;

  // 미체결수량 (양수: 매수대기, 음수: 매도대기) (내부용)
  int64 pending_quantity = 5;
}

// ========== Request/Response Messages ==========

// GetInventory 요청
message GetInventoryRequest {
  string fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  string symbol = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// ListInventories 요청
message ListInventoriesRequest {
  string fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  // 페이지 크기 (optional)
  optional uint32 page_size = 2;

  // 페이지 토큰 (optional, for pagination)
  optional string page_token = 3;

  // 필터링 조건 (optional, AIP-160)
  //
  // Available Operators:
  // * symbol
  //   * `equal`, `contains`
  // * inventory_type
  //   * `equal` (INVENTORY_TYPE_STOCK, INVENTORY_TYPE_DERIV)
  // * stock.sellable, stock.book_quantity
  //   * `equal`, `greater_than`, `less_than`
  // * deriv.quantity
  //   * `equal`, `greater_than`, `less_than`
  //
  // Examples:
  // * filter=symbol:"005930"
  // * filter=inventory_type=INVENTORY_TYPE_STOCK
  // * filter=stock.sellable > 1000
  // * filter=deriv.quantity < 0 (Short 포지션만)
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // 오더링 조건 (optional, AIP-132)
  //
  // Supported Fields:
  // * "symbol", "inventory_type"
  // * "stock.sellable", "stock.book_quantity", "stock.book_amount"
  // * "deriv.quantity", "deriv.book_amount"
  //
  // Examples:
  // * order_by=stock.book_amount desc
  // * order_by=deriv.quantity asc
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// ListInventories 응답
message ListInventoriesResponse {
  // 재고 현황 목록
  repeated Inventory inventories = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

// GetLedgerInventory 요청
message GetLedgerInventoryRequest {
  string fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  string symbol = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

// SyncInventoryFromLedger 요청
message SyncInventoryFromLedgerRequest {
  string fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  // 동기화할 종목 코드 목록 (비어있을 경우 전체 종목 동기화)
  // 예: ["005930", "000660"]
  // "*" 입력 시 전체 종목 동기화
  repeated string symbols = 2 [
    (google.api.field_behavior) = OPTIONAL
  ];
}

// ListLedgerInventories 요청
message ListLedgerInventoriesRequest {
  string fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  // 페이지 크기 (optional)
  optional uint32 page_size = 2;

  // 페이지 토큰 (optional)
  optional string page_token = 3;

  // 필터링 조건 (optional, AIP-160)
  //
  // Available Fields:
  // * symbol - 종목 코드
  // * inventory_type - 재고 유형 (INVENTORY_TYPE_STOCK, INVENTORY_TYPE_DERIV)
  //
  // Examples:
  // * symbol:"005930"
  // * inventory_type=INVENTORY_TYPE_STOCK
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];
}

// ListLedgerInventories 응답
message ListLedgerInventoriesResponse {
  // 원장 재고 목록
  repeated LedgerInventory ledger_inventories = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

// UpdateInventory 용 주식 데이터 (업데이트 가능 필드만)
message UpdateStockData {
  reserved 1, 2;
  reserved "sellable", "borrow_sellable";

  // 장부수량
  int64 book_quantity = 3;
  // 매도예약수량
  int64 selling = 4;
  // 차입수량
  int64 borrow_quantity = 5;
  // 차입매도예약수량
  int64 borrow_selling = 6;
}

// UpdateInventory 용 파생 데이터 (업데이트 가능 필드만)
message UpdateDerivData {
  // 잔고수량 (양수: Long, 음수: Short)
  int64 quantity = 1;
}

// UpdateInventory 요청
message UpdateInventoryRequest {
  string fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  string symbol = 2 [
    (google.api.field_behavior) = REQUIRED
  ];

  // 업데이트할 재고 데이터
  oneof data {
    // DEPRECATED: use stock_patch instead. 서버는 이 variant 사용 시 InvalidArgument 반환.
    StockData stock = 10 [deprecated = true];
    // DEPRECATED: use deriv_patch instead. 서버는 이 variant 사용 시 InvalidArgument 반환.
    DerivData deriv = 11 [deprecated = true];
    // 주식 재고 업데이트 (가용/차입가용만)
    UpdateStockData stock_patch = 12;
    // 파생 재고 업데이트 (잔고만)
    UpdateDerivData deriv_patch = 13;
  }
}

// SyncInventoryFromLedger 응답
message SyncInventoryFromLedgerResponse {
  // 동기화된 재고 목록
  repeated Inventory inventories = 1;

  // 동기화된 종목 수
  int32 synced_count = 2;
}

// ========== 대차거래 Request/Response Messages ==========

// RepayLoan 요청
message RepayLoanRequest {
  // 펀드 리소스명 (예: "funds/KD0001")
  string fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  // 종목코드
  string symbol = 2 [(google.api.field_behavior) = REQUIRED];

  // 상환 수량
  int64 quantity = 3 [(google.api.field_behavior) = REQUIRED];

  // 필드 번호 4, 5는 삭제된 dbcr_date, dbcr_srno 예약
  reserved 4, 5;
  reserved "dbcr_date", "dbcr_srno";
}

// RepayLoan 응답
message RepayLoanResponse {}

// TransferLoan 요청
message TransferLoanRequest {
  // 이전 출발 펀드 리소스명
  string from_fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  // 이전 도착 펀드 리소스명
  string to_fund = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  // 종목코드
  string symbol = 3 [(google.api.field_behavior) = REQUIRED];

  // 이전 수량
  int64 quantity = 4 [(google.api.field_behavior) = REQUIRED];

  // 필드 번호 5는 삭제된 borrow 예약 (loan_transaction_type으로 대체)
  // 필드 번호 6, 7은 삭제된 cntg_date, cntg_no 예약
  // (서버에서 012r TR로 자동 조회하여 매칭하도록 변경)
  reserved 5, 6, 7;
  reserved "borrow", "cntg_date", "cntg_no";

  // 상품포지션구분 (PROD_PSTN_CLS_CODE)
  // 042c/052a InBlock2: 상품유가증권 또는 매도유가증권
  ProductPositionType product_position_type = 8 [(google.api.field_behavior) = OPTIONAL];

  // 처리구분 (PROS_CLS_CODE)
  // 042c InBlock1: 상환/대여/기타/펀드간상환/펀드간대여
  LoanTransactionType loan_transaction_type = 9 [(google.api.field_behavior) = OPTIONAL];
}

// TransferLoan 응답
message TransferLoanResponse {}

// ListLoanDeliveries 요청 (조회 전용)
message ListLoanDeliveriesRequest {
  // 펀드 리소스명
  string fund = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "kdo.cdsapis.xyz/Fund"
    }
  ];

  // 조회 기준일자 (YYYYMMDD)
  string date = 2 [(google.api.field_behavior) = REQUIRED];

  // 대차상대처구분코드 (UNSPECIFIED=전체, DEPOSITORY=예탁원, SECURITIES_FINANCE=증권금융)
  DbcrCnofClsCode dbcr_cnof_cls_code = 3;

  // 대차구분코드 (UNSPECIFIED=전체, LEND=대여, BORROW=차입)
  DbcrClsCode dbcr_cls_code = 4;

  // 종목코드 (빈값=전체)
  string symbol = 5;
}

// ListLoanDeliveries 응답
message ListLoanDeliveriesResponse {

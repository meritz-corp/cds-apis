syntax = "proto3";

package kdo.v1.mm;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/client.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// Market Making 서비스 (기존 LP 서비스와 완전히 독립)
service MarketMakingService {
  // MM 목록 조회
  rpc ListMarketMaking(ListMarketMakingRequest) returns (ListMarketMakingResponse) {
    option (google.api.http) = {
      get: "/v1/mm"
    };
    option (google.api.method_signature) = "";
  }

  // MM 단일 심볼 조회
  rpc GetMarketMaking(GetMarketMakingRequest) returns (MarketMaking) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 설정 업데이트 (DB 저장)
  rpc UpdateMarketMaking(UpdateMarketMakingRequest) returns (MarketMaking) {
    option (google.api.http) = {
      patch: "/v1/mm/{symbol=*}"
      body: "*"
    };
    option (google.api.method_signature) = "symbol,config";
  }

  // MM 상태 조회
  rpc GetMarketMakingStatus(GetMarketMakingStatusRequest) returns (MarketMakingStatus) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}/status"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 시작 (심볼 등록)
  rpc StartMarketMaking(StartMarketMakingRequest) returns (StartMarketMakingResponse) {
    option (google.api.http) = {
      post: "/v1/mm/{symbol=*}:start"
      body: "*"
    };
  }

  // MM 중지 (심볼 해제)
  rpc StopMarketMaking(StopMarketMakingRequest) returns (StopMarketMakingResponse) {
    option (google.api.http) = {
      post: "/v1/mm/{symbol=*}:stop"
      body: "*"
    };
  }

  // MM 엔진 리셋 (일초 상태 초기화)
  rpc ResetMarketMaking(ResetMarketMakingRequest) returns (ResetMarketMakingResponse) {
    option (google.api.http) = {
      post: "/v1/mm/{symbol=*}:reset"
      body: "*"
    };
  }

  // MM 설정 업데이트
  rpc UpdateMarketMakingConfig(UpdateMarketMakingConfigRequest) returns (MarketMakingConfiguration) {
    option (google.api.http) = {
      patch: "/v1/mm/{symbol=*}/config"
      body: "*"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 실시간 상태 스트리밍 (서버→클라이언트)
  rpc StreamMarketMakingStatus(StreamMarketMakingStatusRequest) returns (stream MarketMakingStatus) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}:streamStatus"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 전용 주문장 조회
  rpc GetMarketMakingOrderbook(GetMarketMakingOrderbookRequest) returns (MarketMakingOrderbookData) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}/orderbook"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 전용 주문장 실시간 스트리밍 (서버→클라이언트)
  rpc StreamMarketMakingOrderbook(GetMarketMakingOrderbookRequest) returns (stream MarketMakingOrderbookData) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}/orderbook:stream"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 엔진 런타임 상태 실시간 스트리밍
  rpc StreamMmEngineState(StreamMmEngineStateRequest) returns (stream MmEngineRuntimeState) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}/engine-state:stream"
    };
    option (google.api.method_signature) = "symbol";
  }
}

// ============================================================================
// Enums
// ============================================================================

// MM 상태
enum MarketMakingState {
  MARKET_MAKING_STATE_UNSPECIFIED = 0;
  MARKET_MAKING_STATE_IDLE = 1;        // 대기
  MARKET_MAKING_STATE_RUNNING = 2;     // 활성
  // reserved: 3 (removed MARKET_MAKING_STATE_PAUSED)
  reserved 3;
  reserved "MARKET_MAKING_STATE_PAUSED";
}

// ============================================================================
// Messages
// ============================================================================

// MM 심볼 정보
message MarketMaking {
  // ISIN 심볼
  string symbol = 1;

  // 현재 상태
  MarketMakingState state = 2;

  // MM 설정
  MarketMakingConfiguration config = 3;

  // 펀드 코드
  string fund_code = 4;

  // ETF tick size (Price internal representation)
  int64 tick_size = 5;

  // 매수 호가 수량
  int64 bid_quantity = 6;

  // 매도 호가 수량
  int64 ask_quantity = 7;
}

// MM 상태 상세
message MarketMakingStatus {
  // ISIN 심볼
  string symbol = 1;

  // 현재 상태
  MarketMakingState state = 2;

  // MM 설정 (config 필드에 momentum 포함)
  MarketMakingConfiguration config = 3;

  // reserved: 4 (removed registered field)
  reserved 4;
  reserved "registered";

  // 활성 여부
  bool active = 5;

  // 펀드 코드
  string fund_code = 6;

  // reserved: 7~14 (removed momentum_* fields — use config.momentum instead)
  reserved 7, 8, 9, 10, 11, 12, 13, 14;
  reserved "momentum_enabled", "momentum_window_ms", "momentum_trigger_ticks",
           "momentum_follow_sensitivity", "momentum_escape_sensitivity",
           "momentum_direction", "momentum_bid_adjustment", "momentum_ask_adjustment";
}

// MM 엔진 설정 (MmConfig 대응)
message MarketMakingConfiguration {
  // Pricing 전략: "plain_follow", "mean_bidask", "nav", "krx_nav"
  string pricing = 1;

  // reserved: 2 (removed skew — SkewLogic 제거됨)
  reserved 2;
  reserved "skew";

  // Trade Analyzer 설정
  MarketMakingTradeAnalyzer trade_analyzer = 3;

  // Screening 설정
  MarketMakingScreening screening = 4;

  // MM 활성화 여부
  bool enabled = 6;

  // Momentum 설정 (최근 가격 흐름 → bid/ask 조정)
  MarketMakingMomentum momentum = 7;

  // 통합 포지션 관리 설정
  MarketMakingExposureBalancer exposure_balancer = 8;

  // reserved: 9 (removed inventory_balancer — merged into exposure_balancer)
  reserved 9;
  reserved "inventory_balancer";

  // 기준가격 대비 bid 조정값 (Price internal representation)
  int64 bid_adjustment = 10;

  // 기준가격 대비 ask 조정값 (Price internal representation)
  int64 ask_adjustment = 11;

  // 레벨당 매수 수량
  int64 bid_quantity = 12;

  // 레벨당 매도 수량
  int64 ask_quantity = 13;

  // NAV 계산용 bid basis (Price internal representation)
  int64 bid_basis = 14;

  // NAV 계산용 ask basis (Price internal representation)
  int64 ask_basis = 15;

  // NAV pricing 상세 설정 (pricing = "nav" 일 때 사용)
  MarketMakingNavConfig nav_config = 16;

  // 펀드 코드 (read-only: UpdateMarketMakingConfig에서 변경 불가)
  string fund_code = 17;

  // ETF tick size (read-only: UpdateMarketMakingConfig에서 변경 불가)
  int64 tick_size = 18;

  // 호가 depth (read-only: UpdateMarketMakingConfig에서 변경 불가)
  int32 depth = 19;
}

// reserved: MarketMakingSkew (removed — SkewLogic 제거됨)
// 필드 번호 및 타입 보존을 위해 메시지는 유지하되 사용하지 않음
message MarketMakingSkew {
  // reserved: 모든 필드 deprecated
  reserved 1, 2, 3;
  reserved "mode", "trigger_amt", "skew_unit";
}

// NAV pricing 상세 설정
message MarketMakingNavConfig {
  // EtfPricing 전략 (oneof)
  oneof pricing {
    // PDF 기반 nav 계산 및 헷지 프라이싱
    EtfPricingPdfNavHedge pdf_nav_hedge = 1;

    // 지수 추종 헷지 프라이싱
    EtfPricingIndexTrackingHedge index_tracking_hedge = 2;

    // 선물 베이시스 기반 프라이싱
    EtfPricingFutureBasis future_basis = 3;

    // 레버리지 선물 기반 프라이싱
    EtfPricingLeverageFuture leverage_future = 4;
  }
}

// EtfPricing::PdfNavHedge
message EtfPricingPdfNavHedge {}

// EtfPricing::IndexTrackingHedge
message EtfPricingIndexTrackingHedge {}

// EtfPricing::FutureBasis { prev_index }
message EtfPricingFutureBasis {
  // 이전 지수 (Price internal representation)
  int64 prev_index = 1;
}

// EtfPricing::LeverageFuture { prev_index, prev_future }
message EtfPricingLeverageFuture {
  // 이전 지수 (Price internal representation)
  int64 prev_index = 1;

  // 이전 선물 (Price internal representation)
  int64 prev_future = 2;
}

// Trade Analyzer 설정
message MarketMakingTradeAnalyzer {
  // 활성화 여부
  bool enabled = 1;

  // 분석 윈도우 크기
  uint32 window = 2;

  // Adverse fill ratio 임계값
  double ratio_threshold = 3;

  // Take-fill strength 임계값
  double strength_threshold = 4;

  // 최대 decoration 틱 수
  int32 max_deco_tick = 5;
}

// Pre-trade Screening 설정
message MarketMakingScreening {
  // 최대 스프레드 폭 (틱 단위, 0=비활성)
  int32 max_spread_width_ticks = 1;

  // 최소 가격 (0=비활성)
  int64 min_price = 2;

  // 최대 가격 (0=비활성)
  int64 max_price = 3;
}

// Momentum 설정
message MarketMakingMomentum {
  // 활성화 여부
  bool enabled = 1;

  // 최근 가격 샘플을 유지할 시간 창 (ms)
  uint64 window_ms = 2;

  // 연속 모멘텀 강도를 정규화할 기준 틱 수
  int32 trigger_ticks = 3;

  // 정규화된 모멘텀 강도를 bid 추종 틱으로 바꾸는 민감도
  double follow_sensitivity = 4;

  // 정규화된 모멘텀 강도를 ask/bid 도망 틱으로 바꾸는 민감도
  double escape_sensitivity = 5;

  // bid 추종 최대 틱 수
  int32 max_follow_ticks = 6;

  // ask/bid 도망 최대 틱 수
  int32 max_escape_ticks = 7;

  // 인버스 방향으로 해석할지 여부
  bool is_opposite = 8;
}

// 통합 포지션 관리 설정 (soft rebalance + hard limit)
message MarketMakingExposureBalancer {
  // 활성화 여부
  bool enabled = 1;

  // soft zone: 이 배수부터 soft rebalance 발동
  int32 trigger_multiple = 2;

  // 단계당 가격 중심 이동 틱 수
  int32 price_skew_ticks = 3;

  // reserved: 4, 5, 6, 7 (removed same_side_reduction, min_same_side_scale,
  //   hard_limit_start, hard_limit_max — simplified ExposureBalancer)
  reserved 4, 5, 6, 7;
  reserved "same_side_reduction", "min_same_side_scale", "hard_limit_start", "hard_limit_max";

  // hard zone: 이 배수에서 같은 방향 수량 0 (구 hard_limit_max 대체)
  int32 limit_multiple = 8;
}

// ============================================================================
// Request/Response Messages
// ============================================================================

// ListMarketMaking
message ListMarketMakingRequest {
  // 페이지 크기 (optional)
  optional uint32 page_size = 1;

  // 페이지 토큰 (optional)
  optional string page_token = 2;
}

message ListMarketMakingResponse {
  // 등록된 MM 목록
  repeated MarketMaking entries = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

// GetMarketMaking
message GetMarketMakingRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

// GetMarketMakingStatus
message GetMarketMakingStatusRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

// StartMarketMaking
message StartMarketMakingRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // MM 설정 오버라이드 (optional, 없으면 기본 설정 사용)
  MarketMakingConfiguration config = 2;
}

message StartMarketMakingResponse {
  // 시작된 MM 상태
  MarketMakingStatus status = 1;

  // 메시지
  string message = 2;
}

// StopMarketMaking
message StopMarketMakingRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

message StopMarketMakingResponse {
  // 메시지
  string message = 1;
}

// ResetMarketMaking
message ResetMarketMakingRequest {
  // ISIN 심볼 (빈 문자열이면 전체 리셋)
  string symbol = 1;
}

message ResetMarketMakingResponse {
  // 리셋된 심볼 수
  int32 reset_count = 1;

  // 메시지
  string message = 2;
}

// UpdateMarketMakingConfig
// NOTE: config 내 pricing, fund_code, tick_size, depth 필드는 이 요청으로 변경할 수 없습니다.
// 해당 필드들은 서버에서 무시됩니다.
message UpdateMarketMakingConfigRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // 업데이트할 설정 (전체 교체)
  // pricing, fund_code, tick_size, depth 필드는 read-only이며 무시됩니다.
  MarketMakingConfiguration config = 2 [(google.api.field_behavior) = REQUIRED];
}

// StreamMarketMakingStatus
message StreamMarketMakingStatusRequest {
  // ISIN 심볼 (빈 문자열이면 전체 스트리밍)
  string symbol = 1;
}

// UpdateMarketMaking
message UpdateMarketMakingRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // 업데이트할 MM 설정
  MarketMakingConfiguration config = 2 [(google.api.field_behavior) = REQUIRED];
}

// GetMarketMakingOrderbook / StreamMarketMakingOrderbook
message GetMarketMakingOrderbookRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

// MM 전용 주문장 데이터
message MarketMakingOrderbookData {
  // 매수 호가 목록 (string 표현)
  repeated string bid_prices = 1;

  // 매도 호가 목록 (string 표현)
  repeated string ask_prices = 2;

  // 매수 수량 목록
  repeated int64 bid_quantities = 3;

  // 매도 수량 목록
  repeated int64 ask_quantities = 4;
}

// ============================================================================
// MM 엔진 런타임 상태
// ============================================================================

// Momentum 런타임 상태
message MomentumState {
  // 현재 모멘텀 방향 ("up", "down", "neutral")
  string direction = 1;

  // 현재 bid 가격 조정값 (Price internal representation)
  int64 bid_adjustment = 2;

  // 현재 ask 가격 조정값 (Price internal representation)
  int64 ask_adjustment = 3;

  // 원시 틱 변화량 (부호 포함)
  double raw_ticks = 4;

  // 정규화 강도 (raw_ticks / trigger_ticks)
  double normalized_strength = 5;

  // 실제 적용된 follow 틱
  int32 follow_ticks = 6;

  // 실제 적용된 escape 틱
  int32 escape_ticks = 7;

  // 윈도우 내 샘플 수
  int32 sample_count = 8;
}

// reserved: SkewState (removed — SkewLogic 제거됨)
// 필드 번호 및 타입 보존을 위해 메시지는 유지하되 사용하지 않음
message SkewState {
  // reserved: 모든 필드 deprecated
  reserved 1;
  reserved "net_traded";
}

// Trade Analyzer 런타임 상태
message TradeAnalyzerState {
  // 현재 decoration 틱 수
  int32 deco_tick = 1;

  // 현재 윈도우 내 체결 횟수
  int32 fill_count = 2;
}

// 순노출 및 재고 균형 런타임 상태 (ExposureGuard + InventoryBalancer 통합)
message ExposureBalancerState {
  // 현재 순노출 수량
  int64 net_exposure = 1;

  // 현재 가격 중심 이동 틱 수
  int32 price_shift_ticks = 2;

  // 현재 bid 수량 스케일 (0.0 ~ 1.0)
  double bid_scale = 3;

  // 현재 ask 수량 스케일 (0.0 ~ 1.0)
  double ask_scale = 4;
}

// MM 엔진 전체 런타임 상태 스냅샷
message MmEngineRuntimeState {
  // ISIN 심볼
  string symbol = 1;

  // 상태 스냅샷 타임스탬프 (Unix nanoseconds)
  int64 timestamp = 2;

  // Momentum 상태
  MomentumState momentum = 3;

  // reserved: 4 (removed skew — SkewLogic 제거됨)
  reserved 4;
  reserved "skew";

  // Trade Analyzer 상태
  TradeAnalyzerState trade_analyzer = 5;

  // 순노출 및 재고 균형 상태 (기존 exposure_guard(6) + inventory_balancer(7) 통합)
  ExposureBalancerState exposure_balancer = 6;

  // reserved: 7 (removed inventory_balancer field)
  reserved 7;
  reserved "inventory_balancer";
}

// ============================================================================
// MM 엔진 상태 Request Messages
// ============================================================================

// StreamMmEngineState
message StreamMmEngineStateRequest {
  // ISIN 심볼 (빈 문자열이면 전체 스트리밍)
  string symbol = 1;
}

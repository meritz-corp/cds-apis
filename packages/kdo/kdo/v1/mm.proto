syntax = "proto3";

package kdo.v1.mm;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/client.proto";
import "google/protobuf/empty.proto";
import "kdo/v1/common.proto";

option go_package = "github.com/meritz-corp/cds-apis/go/kdo/v1;kdo";

// Market Making 서비스 (기존 LP 서비스와 완전히 독립)
service MarketMakingService {
  // MM 목록 조회
  rpc ListMarketMaking(ListMarketMakingRequest) returns (ListMarketMakingResponse) {
    option (google.api.http) = {
      get: "/v1/mm"
    };
    option (google.api.method_signature) = "";
  }

  // MM 단일 심볼 조회
  rpc GetMarketMaking(GetMarketMakingRequest) returns (MarketMaking) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 설정 업데이트 (DB 저장)
  rpc UpdateMarketMaking(UpdateMarketMakingRequest) returns (MarketMaking) {
    option (google.api.http) = {
      patch: "/v1/mm/{symbol=*}"
      body: "*"
    };
    option (google.api.method_signature) = "symbol,config";
  }

  // MM 시작 (심볼 등록)
  rpc StartMarketMaking(StartMarketMakingRequest) returns (StartMarketMakingResponse) {
    option (google.api.http) = {
      post: "/v1/mm/{symbol=*}:start"
      body: "*"
    };
  }

  // MM 중지 (심볼 해제)
  rpc StopMarketMaking(StopMarketMakingRequest) returns (StopMarketMakingResponse) {
    option (google.api.http) = {
      post: "/v1/mm/{symbol=*}:stop"
      body: "*"
    };
  }

  // MM 설정 업데이트
  rpc UpdateMarketMakingConfig(UpdateMarketMakingConfigRequest) returns (MarketMakingConfiguration) {
    option (google.api.http) = {
      patch: "/v1/mm/{symbol=*}/config"
      body: "*"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 전용 주문장 조회
  rpc GetMarketMakingOrderbook(GetMarketMakingOrderbookRequest) returns (MarketMakingOrderbookData) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}/orderbook"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 전용 주문장 실시간 스트리밍 (서버→클라이언트)
  rpc StreamMarketMakingOrderbook(GetMarketMakingOrderbookRequest) returns (stream MarketMakingOrderbookData) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}/orderbook:stream"
    };
    option (google.api.method_signature) = "symbol";
  }

  // MM 엔진 런타임 상태 실시간 스트리밍
  rpc StreamMmStateUpdate(StreamMmStateUpdateRequest) returns (stream MmStateUpdate) {
    option (google.api.http) = {
      get: "/v1/mm/{symbol=*}/engine-state:stream"
    };
    option (google.api.method_signature) = "symbol";
  }

  // Fit to Market: 현재 호가 중심을 ETF 시장 mid 가격으로 스냅하는 평행 skew를 1회 설정
  rpc FitToMarket(FitToMarketRequest) returns (FitToMarketResponse) {
    option (google.api.http) = {
      post: "/v1/mm/{symbol=*}:fitToMarket"
      body: "*"
    };
  }

  // Clear Fit to Market: F2M skew 해제 (0으로 리셋)
  rpc ClearFitToMarket(ClearFitToMarketRequest) returns (ClearFitToMarketResponse) {
    option (google.api.http) = {
      post: "/v1/mm/{symbol=*}:clearFitToMarket"
      body: "*"
    };
  }
}

// ============================================================================
// Enums
// ============================================================================

// MM 상태
enum MarketMakingState {
  MARKET_MAKING_STATE_UNSPECIFIED = 0;
  MARKET_MAKING_STATE_IDLE = 1;        // 대기
  MARKET_MAKING_STATE_RUNNING = 2;     // 활성
}

// ============================================================================
// Messages
// ============================================================================

// MM 심볼 정보
message MarketMaking {
  // ISIN 심볼
  string symbol = 1;

  // 현재 상태
  MarketMakingState state = 2;

  // MM 설정
  MarketMakingConfiguration config = 3;

  // 펀드 코드
  string fund_code = 4;

  // ETF tick size (Price internal representation)
  int64 tick_size = 5;
}

// MM 엔진 설정 (MmConfig 대응)
message MarketMakingConfiguration {
  // MM 활성화 여부
  bool enabled = 1;

  // NAV pricing 상세 설정 (pricing = "nav" 일 때 사용)
  MarketMakingPricing pricing = 2;

  // Trade Analyzer 설정
  MarketMakingTradeAnalyzer trade_analyzer = 3;

  // MarketBias 설정 (장기 시장 체결 누적 → 영구 skew)
  MarketMakingMarketBias market_bias = 4;

  // Momentum 설정 (단기 시장 체결 비율/강도 → 즉각 bid/ask 동일 shift)
  MarketMakingMomentum momentum = 5;

  // 통합 포지션 관리 설정
  MarketMakingExposureBalancer exposure_balancer = 6;

  // 필드 7, 8, 11, 12 제거 (bid_adjustment, ask_adjustment, bid_basis, ask_basis — deprecated)
  reserved 7, 8, 11, 12;
  reserved "bid_adjustment", "ask_adjustment", "bid_basis", "ask_basis";

  // 레벨당 매수 수량
  int64 bid_quantity = 9;

  // 레벨당 매도 수량
  int64 ask_quantity = 10;

  // NAV+adj 기준가 대비 bid 추가 gap (Price internal representation)
  int64 bid_offset = 13;

  // NAV+adj 기준가 대비 ask 추가 gap (Price internal representation)
  int64 ask_offset = 14;

  // 단일 basis (bid_basis/ask_basis 통합 후속, Price internal representation)
  optional int64 basis = 15;

  // 호가 반폭 (틱 수). bid = mid - half, ask = mid + half
  int32 base_half_ticks = 16;

  // 순포지션 수량 한도 (방향별 호가 차단)
  MarketMakingQuantityLimit quantity_limit = 17;
}

// NAV pricing 상세 설정
message MarketMakingPricing {
  // EtfPricing 전략 (oneof)
  oneof pricing {
    // PDF 기반 nav 계산 및 헷지 프라이싱
    PlainFollow plain_follow = 1;

    // 지수 추종 헷지 프라이싱
    MeanBidAsk mean_bid_ask = 2;

    // 선물 베이시스 기반 프라이싱
    Nav nav = 3;

    // 레버리지 선물 기반 프라이싱
    KrxNav krx_nav = 4;
  }
}

// EtfPricing::PdfNavHedge
message PlainFollow {}

// EtfPricing::IndexTrackingHedge
message MeanBidAsk {}

// EtfPricing::FutureBasis { prev_index }
message Nav {
  // 이전 지수 (Price internal representation)
  kdo.v1.common.EtfPricing etf_pricing = 1;
}

// EtfPricing::LeverageFuture { prev_index, prev_future }
message KrxNav {
  // 이전 지수 (Price internal representation)
  int64 prev_index = 1;

  // 이전 선물 (Price internal representation)
  int64 prev_future = 2;
}

// Trade Analyzer 설정 (갤럭티코 SingleTradeAnalyzer 포팅 — 시장 체결 추종)
message MarketMakingTradeAnalyzer {
  // 활성화 여부
  bool enabled = 1;

  // 매 체결마다 net/total 에 곱하는 감쇠 비율 (갤럭티코 기본 0.98)
  double count_decay_ratio = 2;

  // 시간 감쇠 주기 (초). 0 = 비활성 (갤럭티코 기본 10)
  uint64 decay_interval_secs = 3;

  // 시간 주기마다 total 에 곱하는 비율 (갤럭티코 기본 0.95)
  double total_decay_ratio = 4;

  // 시간 주기마다 net 에 곱하는 비율 (갤럭티코 기본 0.9). total_decay_ratio 보다 작아야 방향성이 먼저 사라짐.
  double net_decay_ratio = 5;

  // strength 분모 최소치 (기본 100)
  int64 min_book_qty = 6;
}

// Momentum 설정 (갤럭티코 DecoByTrade 포팅 — ratio/strength 기반 양쪽 동일 shift)
message MarketMakingMomentum {
  // 활성화 여부
  bool enabled = 1;

  // 인버스 ETF: ratio 부호 반전
  bool is_opposite = 2;

  // 최대 shift (tick 단위, 갤럭티코 pInfo.p1/100 등가)
  double max_tick = 3;

  // ratio 발동 임계 ∈ [0, 1) (갤럭티코 pInfo.p2/100)
  double ratio_threshold = 4;

  // strength 발동 임계 ∈ [0, 1) (갤럭티코 pInfo.p3/100)
  double strength_threshold = 5;
}

// MarketBias 설정 (갤럭티코 DecoByTradeAcc 포팅 — 장기 누적 영구 skew)
message MarketMakingMarketBias {
  // 활성화 여부
  bool enabled = 1;

  // 주기 평가 간격 (초, 갤럭티코 accNextUpdateSec 기본 60)
  uint64 eval_interval_secs = 2;

  // ratio 발동 임계 (기본 0.6)
  double ratio_threshold = 3;

  // strength 발동 임계 (기본 0.5)
  double strength_threshold = 4;

  // 점수 임계 0~100 (기본 5). 이 위를 통과해야 한 단계 가산.
  int32 bias_huddle = 5;

  // 1 단계 가산량 (가격 단위, Price internal representation)
  int64 bias_unit = 6;

  // 누적 상한 절댓값 (가격 단위, Price internal representation)
  int64 max_bias = 7;
}

// 통합 포지션 관리 설정 (soft rebalance + hard limit)
message MarketMakingExposureBalancer {
  reserved 2, 3, 4;
  reserved "trigger_multiple", "price_skew_ticks", "limit_multiple";

  // 활성화 여부
  bool enabled = 1;

  // opportunistic close 기능 활성화 여부
  bool opportunistic_enabled = 5;

  // soft zone 기준 수량 (절대 수량). 가격 shift 기울기의 분모 + 수량 축소 발동 임계 (mm_dan skewTriggerAmt 대응)
  int64 trigger_quantity = 6;

  // trigger_quantity 당 가격 이동 기울기 (원, 소수 허용). shift = -(net/trigger_quantity) × 이 값 — 연속 비례, 틱 배수 아니어도 됨. 엔진 마지막 normalize 가 정렬 (mm_dan skewUnit 대응)
  double price_skew_unit = 7;

  // hard zone (절대 수량). 이 수량에서 같은 방향 수량 0 + shift 상한 ((limit_quantity/trigger_quantity) × price_skew_unit)
  int64 limit_quantity = 8;
}

// 순포지션 수량 한도 설정 (방향별 호가 차단)
message MarketMakingQuantityLimit {
  // 순매수(롱) 상한. net(매수체결-매도체결) >= 이 값이면 매수 호가 차단. 0=비활성
  int64 max_bid_quantity = 1;

  // 순매도(숏) 상한. net <= -이 값이면 매도 호가 차단. 0=비활성
  int64 max_ask_quantity = 2;
}

// ============================================================================
// Request/Response Messages
// ============================================================================

// ListMarketMaking
message ListMarketMakingRequest {
  // 페이지 크기 (optional)
  optional uint32 page_size = 1;

  // 페이지 토큰 (optional)
  optional string page_token = 2;
}

message ListMarketMakingResponse {
  // 등록된 MM 목록
  repeated MarketMaking entries = 1;

  // 다음 페이지 토큰
  string next_page_token = 2;
}

// GetMarketMaking
message GetMarketMakingRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

// GetMarketMakingStatus
message GetMarketMakingStatusRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

// StartMarketMaking
message StartMarketMakingRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // MM 설정 오버라이드 (optional, 없으면 기본 설정 사용)
  MarketMakingConfiguration config = 2;
}

message StartMarketMakingResponse {
  // 시작된 MM 상태
  MarketMakingState state = 1;

  // 메시지
  string message = 2;
}

// StopMarketMaking
message StopMarketMakingRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

message StopMarketMakingResponse {
  // 메시지
  string message = 1;
}

// ResetMarketMaking
message ResetMarketMakingRequest {
  // ISIN 심볼 (빈 문자열이면 전체 리셋)
  string symbol = 1;
}

message ResetMarketMakingResponse {
  // 리셋된 심볼 수
  int32 reset_count = 1;

  // 메시지
  string message = 2;
}

// UpdateMarketMakingConfig
// NOTE: config 내 pricing, fund_code, tick_size, depth 필드는 이 요청으로 변경할 수 없습니다.
// 해당 필드들은 서버에서 무시됩니다.
message UpdateMarketMakingConfigRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // 업데이트할 설정 (전체 교체)
  // pricing, fund_code, tick_size, depth 필드는 read-only이며 무시됩니다.
  MarketMakingConfiguration config = 2 [(google.api.field_behavior) = REQUIRED];
}

// StreamMarketMakingStatus
message StreamMarketMakingStatusRequest {
  // ISIN 심볼 (빈 문자열이면 전체 스트리밍)
  string symbol = 1;
}

// UpdateMarketMaking
message UpdateMarketMakingRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];

  // 업데이트할 MM 설정
  MarketMakingConfiguration config = 2 [(google.api.field_behavior) = REQUIRED];
}

// GetMarketMakingOrderbook / StreamMarketMakingOrderbook
message GetMarketMakingOrderbookRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

// MM 전용 주문장 데이터
message MarketMakingOrderbookData {
  // 매수 호가 목록 (string 표현)
  repeated string bid_prices = 1;

  // 매도 호가 목록 (string 표현)
  repeated string ask_prices = 2;

  // 매수 수량 목록
  repeated int64 bid_quantities = 3;

  // 매도 수량 목록
  repeated int64 ask_quantities = 4;
}

// ============================================================================
// MM 엔진 런타임 상태
// ============================================================================

// Momentum 런타임 상태
message MomentumState {
  // 현재 모멘텀 방향 ("none" / "up" / "down")
  string direction = 1;

  // 현재 bid 가격 조정값 (Price internal representation)
  int64 bid_adjustment = 2;

  // 현재 ask 가격 조정값 (Price internal representation)
  int64 ask_adjustment = 3;

  // 원시 틱 변화량 (부호 포함, 모니터링용)
  double raw_ticks = 4;
}

// Trade Analyzer 런타임 상태 (갤럭티코 SingleTradeAnalyzer 포팅)
message TradeAnalyzerState {
  // 매수/매도 누적 비율 ∈ [-1, +1]. 매수 우세 +.
  double ratio = 1;

  // 체결 강도 ∈ [0, 1]. ratio 방향 가중 호가창 잔량 대비 누적 체결량.
  double strength = 2;

  // 부호 있는 누적 체결량 (매수 우세 +)
  int64 net_amount = 3;

  // 절댓값 누적 체결량
  int64 total_amount = 4;

  // 5단 호가 평균 매수 잔량
  double avg_bid_qty = 5;

  // 5단 호가 평균 매도 잔량
  double avg_ask_qty = 6;

  // 마지막 시장 체결 시각 (일중 마이크로초). 체결 없으면 absent.
  optional int64 last_trade_at_us = 7;

  // 누적 시장 체결 건수
  int64 trade_count = 8;
}

// MarketBias 런타임 상태 (갤럭티코 DecoByTradeAcc 포팅)
message MarketBiasState {
  // 누적 영구 편향 (가격 단위, Price internal representation)
  int64 accumulated_bias = 1;

  // 마지막 평가 점수 (0~100)
  int32 last_score = 2;

  // 누적 평가 횟수
  int64 eval_count = 3;
}

// 순노출 및 재고 균형 런타임 상태 (ExposureGuard + InventoryBalancer 통합)
message ExposureBalancerState {
  reserved 2;
  reserved "price_shift_ticks";

  // 현재 순노출 수량
  int64 net_exposure = 1;

  // 현재 bid 수량 스케일 (0.0 ~ 1.0)
  double bid_scale = 3;

  // 현재 ask 수량 스케일 (0.0 ~ 1.0)
  double ask_scale = 4;

  // 현재 가격 중심 이동량 (원, 소수 가능). -(net/trigger_quantity) × price_skew_unit — limit 에서 saturate
  double price_shift = 5;
}

// MM 엔진 런타임 상태 델타 메시지.
// 스트리밍 시 set된 필드만 변경분을 의미하며, 변경이 없는 필드는 생략된다.
// symbol은 항상 포함된다.
message MmStateUpdate {
  // ISIN 심볼 (항상 포함)
  string symbol = 1;

  // MM 상태 (변경 시에만 포함)
  optional MarketMakingState state = 2;

  // Momentum 상태 (변경 시에만 포함)
  optional MomentumState momentum = 3;

  // Trade Analyzer 상태 (변경 시에만 포함)
  optional TradeAnalyzerState trade_analyzer = 4;

  // 순노출 및 재고 균형 상태 (변경 시에만 포함)
  optional ExposureBalancerState exposure_balancer = 5;

  // MarketBias 상태 (변경 시에만 포함)
  optional MarketBiasState market_bias = 6;

  // 현재 MM 매도 호가 (변경 시에만 포함, None이면 생략)
  optional string ask_quote = 7;

  // 현재 MM 매수 호가 (변경 시에만 포함, None이면 생략)
  optional string bid_quote = 8;

  // 현재 적용 중인 bid offset (변경 시에만 포함, None이면 생략)
  optional string bid_offset = 9;

  // 현재 적용 중인 ask offset (변경 시에만 포함, None이면 생략)
  optional string ask_offset = 10;

  // 호가 산출 단계별 분해 (변경 시에만 포함, 디버깅/튜닝용)
  optional SpreadDecomposition decomposition = 11;

  // 현재 적용 중인 F2M(Fit to Market) 평행 skew, Price 내부표현값(string). 변경 시에만 포함, None이면 생략. 0 = 미적용/해제
  optional string f2m_shift = 12;
}

// 호가 산출 단계별 contribution. 최종 호가 = base + momentum + exposure_shift + market_bias.
message SpreadDecomposition {
  // Pricing 직후 bid (NAV + bid_adjustment, Price internal representation)
  int64 base_bid = 1;

  // Pricing 직후 ask (NAV + ask_adjustment, Price internal representation)
  int64 base_ask = 2;

  // Momentum 가산량 (부호 포함, bid·ask 동일, Price internal representation)
  int64 momentum_shift = 3;

  // ExposureSkew 가산량 (부호 포함, bid·ask 동일, Price internal representation)
  int64 exposure_shift = 4;

  // MarketBias 영구 편향 (부호 포함, bid·ask 동일, Price internal representation)
  int64 market_bias_shift = 5;

  // 정렬 후 최종 bid (Price internal representation)
  int64 final_bid = 6;

  // 정렬 후 최종 ask (Price internal representation)
  int64 final_ask = 7;
}

// ============================================================================
// MM 엔진 상태 Request Messages
// ============================================================================

// StreamMmStateUpdate
message StreamMmStateUpdateRequest {
  // ISIN 심볼 (빈 문자열이면 전체 스트리밍)
  string symbol = 1;
}

// FitToMarket
message FitToMarketRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

message FitToMarketResponse {
  // 메시지
  string message = 1;
}

// ClearFitToMarket
message ClearFitToMarketRequest {
  // ISIN 심볼
  string symbol = 1 [(google.api.field_behavior) = REQUIRED];
}

message ClearFitToMarketResponse {
